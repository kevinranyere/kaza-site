<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>KAZA Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand */
  --v:#1E3A2F; --vd:#152a22; --vl:#2a4d3f; --vs:#e8f5ec;
  --t:#C4622D; --tl:#E8845A; --ts:#fff3ee;
  /* Light content area */
  --bg:#F7F5F1;          /* off-white quente — principal */
  --bg2:#FFFFFF;         /* branco puro — cards */
  --bg3:#F0EDE8;         /* hover, alternating */
  /* Sidebar (dark green) */
  --sb:#1E3A2F; --sb2:#182e24; --sb3:#243d2f;
  --sb-text:#e8f0e9; --sb-text2:rgba(232,240,233,.6); --sb-text3:rgba(232,240,233,.3);
  --sb-border:rgba(255,255,255,.07);
  /* Content typography */
  --ch:#111827;    /* heading */
  --cm:#374151;    /* body */
  --cs:#6b7280;    /* secondary */
  --ct:#9ca3af;    /* tertiary */
  /* Borders */
  --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.05);
  /* Status */
  --success:#15803d; --success-bg:#dcfce7; --success-bd:#bbf7d0;
  --warn:#b45309;   --warn-bg:#fef3c7;   --warn-bd:#fde68a;
  --danger:#b91c1c; --danger-bg:#fee2e2; --danger-bd:#fecaca;
  --info:#1d4ed8;   --info-bg:#dbeafe;   --info-bd:#bfdbfe;
  /* Radii */
  --r:10px; --r-sm:6px; --r-lg:14px;
  /* Shadows */
  --sh-xs:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --sh-lg:0 4px 6px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.1);
  --font:'DM Sans',sans-serif; --fd:'Playfair Display',serif;
}

body{font-family:var(--font);background:var(--bg);color:var(--cm);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}

/* ════════════════════ LOGIN ════════════════════ */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
  background:var(--v);
}
.login-card{
  background:#fff;border-radius:16px;padding:40px;
  width:100%;max-width:380px;
  box-shadow:var(--sh-lg);
}
.login-logo{font-family:var(--fd);font-size:1.7rem;color:var(--ch);margin-bottom:4px}
.login-logo span{color:var(--t)}
.login-badge{
  display:inline-block;background:var(--ts);color:var(--t);
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 10px;border-radius:4px;border:1px solid rgba(196,98,45,.2);margin-bottom:28px;
}
.login-fg{margin-bottom:14px}
.login-label{
  display:block;font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--cs);margin-bottom:6px;
}
.login-input{
  width:100%;padding:10px 14px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);background:#fff;
  color:var(--ch);font-size:14px;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.login-input:focus{border-color:var(--t);box-shadow:0 0 0 3px rgba(196,98,45,.1)}
.login-btn{
  width:100%;padding:11px;border-radius:var(--r-sm);border:none;
  background:var(--v);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s;
}
.login-btn:hover{background:var(--vl)}
.login-err{
  background:var(--danger-bg);border:1px solid var(--danger-bd);
  color:var(--danger);border-radius:var(--r-sm);
  padding:10px 14px;font-size:13px;margin-top:12px;display:none;
}
.login-err.show{display:block}

/* ════════════════════ APP SHELL ════════════════════ */
#app{display:none;height:100vh;overflow:hidden}
#app.show{display:flex}

/* ════════════════════ SIDEBAR (dark green) ════════════════════ */
.sidebar{
  width:224px;flex-shrink:0;
  background:var(--sb);border-right:1px solid var(--sb-border);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;
}
.sidebar-logo{
  padding:18px 18px 16px;
  border-bottom:1px solid var(--sb-border);
}
.sidebar-logo-wrap{display:flex;align-items:center;justify-content:space-between}
.sidebar-logo-text{font-family:var(--fd);font-size:1.15rem;color:#fff}
.sidebar-logo-text span{color:var(--tl)}
.sidebar-logo-badge{
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  background:rgba(196,98,45,.2);color:var(--tl);padding:2px 8px;border-radius:3px;
}
.sidebar-nav{flex:1;padding:10px 8px}
.nav-section{
  font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--sb-text3);padding:14px 10px 5px;
}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:7px;color:var(--sb-text2);
  cursor:pointer;transition:all .12s;border:none;background:none;
  width:100%;text-align:left;font-size:13px;font-weight:450;
  margin-bottom:1px;
}
.nav-item i{font-size:16px;flex-shrink:0;opacity:.8}
.nav-item:hover{background:rgba(255,255,255,.07);color:var(--sb-text)}
.nav-item:hover i{opacity:1}
.nav-item.active{
  background:rgba(196,98,45,.18);color:#fff;
  font-weight:600;
}
.nav-item.active i{opacity:1;color:var(--tl)}
.nav-badge{
  margin-left:auto;background:#ef4444;color:#fff;
  font-size:10px;font-weight:700;padding:0px 6px;
  border-radius:10px;min-width:18px;text-align:center;line-height:18px;height:18px;
}
.sidebar-footer{padding:12px;border-top:1px solid var(--sb-border)}
.sidebar-user{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding:6px 4px}
.sidebar-avatar{
  width:30px;height:30px;border-radius:50%;background:var(--t);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}
.sidebar-user-name{font-size:13px;font-weight:600;color:var(--sb-text)}
.sidebar-user-role{font-size:10px;color:var(--sb-text3);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.logout-btn{
  width:100%;padding:8px 12px;border-radius:7px;
  border:1px solid var(--sb-border);background:none;color:var(--sb-text2);
  font-size:12px;display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:all .15s;
}
.logout-btn:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5}

/* ════════════════════ MAIN AREA (light) ════════════════════ */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--bg)}

/* Topbar */
.topbar{
  padding:0 24px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-bottom:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;z-index:10;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:14px;font-weight:600;color:var(--ch)}
.topbar-breadcrumb{font-size:13px;color:var(--ct);display:flex;align-items:center;gap:6px}
.topbar-breadcrumb i{font-size:10px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-link{
  font-size:12px;font-weight:500;color:var(--cs);
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:6px;
  transition:all .12s;border:1px solid var(--border);background:#fff;
}
.topbar-link:hover{background:var(--bg);color:var(--ch)}
.content{padding:24px;flex:1;max-width:1400px;width:100%}

/* ════════════════════ STAT CARDS ════════════════════ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:28px}
.stat-card{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--r);padding:18px 20px;
  transition:box-shadow .15s,border-color .15s;
  position:relative;overflow:hidden;
}
.stat-card:hover{box-shadow:var(--sh);border-color:rgba(196,98,45,.15)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;border-radius:var(--r) var(--r) 0 0}
.stat-card.accent::before{background:linear-gradient(90deg,var(--t),var(--tl))}
.stat-label{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--ct);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.stat-label i{font-size:14px;color:var(--cs)}
.stat-n{
  font-family:var(--fd);font-size:2rem;color:var(--ch);
  line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em;
}
.stat-card.accent .stat-n{color:var(--t)}
.stat-sub{font-size:11px;color:var(--ct);margin-top:6px;display:flex;align-items:center;gap:4px}
.stat-trend{
  display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;
  padding:1px 6px;border-radius:4px;
}
.stat-trend.up{background:var(--success-bg);color:var(--success)}
.stat-trend.warn{background:var(--warn-bg);color:var(--warn)}

/* ════════════════════ TABLE WRAPPER ════════════════════ */
.table-wrap{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  box-shadow:var(--sh-xs);margin-bottom:20px;
}
.table-header{
  padding:14px 18px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-wrap:wrap;background:#fff;
}
.table-title{
  font-size:14px;font-weight:600;color:var(--ch);
  display:flex;align-items:center;gap:8px;
}
.table-title i{color:var(--t);font-size:16px}
.table-count{font-size:12px;color:var(--ct);font-weight:400;margin-left:4px}

/* Filters */
.table-filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{
  padding:4px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:#fff;
  color:var(--cs);font-size:12px;font-weight:500;cursor:pointer;
  transition:all .12s;white-space:nowrap;
}
.filter-btn:hover{border-color:rgba(196,98,45,.3);color:var(--t);background:var(--ts)}
.filter-btn.active{background:var(--v);border-color:var(--v);color:#fff}

/* Table */
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
thead th{
  padding:10px 16px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--ct);border-bottom:1px solid var(--border2);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:nth-child(even){background:rgba(247,245,241,.4)}
tbody tr:hover{background:rgba(196,98,45,.04)}
td{padding:11px 16px;font-size:13px;color:var(--cm);vertical-align:middle}
td.name{color:var(--ch);font-weight:500}

/* ════════════════════ BADGES — vivid ════════════════════ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;padding:3px 8px;border-radius:4px;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-active{background:var(--success-bg);color:var(--success);border:1px solid var(--success-bd)}
.badge-active::before{background:var(--success)}
.badge-pending{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
.badge-pending::before{background:var(--warn)}
.badge-rejected{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-bd)}
.badge-rejected::before{background:var(--danger)}
.badge-sold{background:var(--info-bg);color:var(--info);border:1px solid var(--info-bd)}
.badge-sold::before{background:var(--info)}
.badge-paused{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.badge-paused::before{background:#9ca3af}
.badge-featured{background:var(--ts);color:var(--t);border:1px solid rgba(196,98,45,.2)}
.badge-featured::before{background:var(--t)}
.badge-agency{background:var(--vs);color:var(--v);border:1px solid rgba(30,58,47,.2)}
.badge-agency::before{background:var(--v)}
.badge-admin{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-bd)}

/* ════════════════════ ACTION BUTTONS ════════════════════ */
.actions{display:flex;gap:5px;flex-wrap:wrap}
.act{
  padding:4px 10px;border-radius:5px;
  border:1px solid var(--border);background:#fff;
  color:var(--cs);font-size:11.5px;font-weight:500;
  cursor:pointer;transition:all .12s;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;
}
.act:hover{background:var(--bg);color:var(--ch);border-color:rgba(0,0,0,.15)}
.act.approve{color:var(--success);border-color:var(--success-bd);background:var(--success-bg)}
.act.approve:hover{background:#bbf7d0;border-color:var(--success)}
.act.reject{color:var(--danger);border-color:var(--danger-bd);background:var(--danger-bg)}
.act.reject:hover{background:#fecaca;border-color:var(--danger)}
.act.feature{color:var(--t);border-color:rgba(196,98,45,.3);background:var(--ts)}
.act.feature:hover{background:#fed7aa;border-color:var(--t)}
.act.danger{color:var(--danger);border-color:var(--danger-bd)}
.act.danger:hover{background:var(--danger-bg)}
.act.verify{color:var(--info);border-color:var(--info-bd);background:var(--info-bg)}
.act.verify:hover{background:#bfdbfe;border-color:var(--info)}

/* ════════════════════ EMPTY STATES ════════════════════ */
.empty{
  padding:56px 24px;text-align:center;
  display:flex;flex-direction:column;align-items:center;
}
.empty-icon{
  width:52px;height:52px;border-radius:14px;
  background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
}
.empty-icon i{font-size:24px;color:var(--ct)}
.empty-title{font-size:15px;font-weight:600;color:var(--ch);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--cs);max-width:360px;line-height:1.6;margin-bottom:16px}
.empty-cta{
  padding:7px 16px;border-radius:var(--r-sm);
  background:var(--v);color:#fff;border:none;
  font-size:13px;font-weight:500;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  transition:background .15s;
}
.empty-cta:hover{background:var(--vl)}

/* ════════════════════ LOADING ════════════════════ */
.loading{padding:48px;text-align:center;color:var(--ct)}
.spinner{
  width:22px;height:22px;border:2px solid var(--border);
  border-top-color:var(--t);border-radius:50%;
  animation:spin .65s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════════════ TOAST ════════════════════ */
#toast{
  position:fixed;bottom:20px;right:20px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast-item{
  background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 16px;font-size:13px;color:var(--ch);
  box-shadow:var(--sh-lg);animation:toastIn .2s ease;
  display:flex;align-items:center;gap:8px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.toast-s{border-left:3px solid var(--success)}
.toast-e{border-left:3px solid var(--danger)}
.toast-i{border-left:3px solid var(--info)}

/* ════════════════════ MODAL ════════════════════ */
.modal-bg{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(2px);
}
.modal{
  background:#fff;border:1px solid var(--border);
  border-radius:var(--r-lg);padding:28px;
  width:100%;max-width:440px;
  box-shadow:var(--sh-lg);
}
.modal-title{
  font-size:15px;font-weight:600;color:var(--ch);
  margin-bottom:20px;display:flex;align-items:center;gap:8px;
  padding-bottom:14px;border-bottom:1px solid var(--border);
}
.modal-fi{
  width:100%;padding:9px 12px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);background:#fff;
  color:var(--ch);font-size:13px;outline:none;margin-bottom:12px;
  transition:border-color .15s,box-shadow .15s;
}
.modal-fi:focus{border-color:var(--t);box-shadow:0 0 0 3px rgba(196,98,45,.1)}
.modal-actions{
  display:flex;gap:8px;justify-content:flex-end;
  margin-top:16px;padding-top:16px;border-top:1px solid var(--border);
}
.modal-btn{
  padding:8px 18px;border-radius:var(--r-sm);font-size:13px;
  font-weight:500;cursor:pointer;border:1px solid var(--border);
  background:#fff;color:var(--cm);transition:all .12s;
}
.modal-btn:hover{background:var(--bg);color:var(--ch)}
.modal-btn.primary{background:var(--v);border-color:var(--v);color:#fff}
.modal-btn.primary:hover{background:var(--vl)}

/* ════════════════════ MISC ════════════════════ */
.listing-thumb{width:44px;height:34px;border-radius:5px;object-fit:cover;background:var(--bg3)}
.radar-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.radar-card-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.radar-tag{
  font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  background:#fff;border:1px solid var(--border);color:var(--cs);
  padding:2px 8px;border-radius:4px;
}

/* Activity feed (dashboard) */
.activity-feed{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-xs);overflow:hidden}
.activity-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 18px;border-bottom:1px solid var(--border2);
}
.activity-item:last-child{border-bottom:none}
.activity-dot{
  width:8px;height:8px;border-radius:50%;background:var(--t);
  flex-shrink:0;margin-top:5px;
}
.activity-text{font-size:13px;color:var(--cm);line-height:1.5}
.activity-time{font-size:11px;color:var(--ct);margin-top:2px}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:2px}

/* ════════════════════ RESPONSIVE ════════════════════ */
@media(max-width:768px){
  .sidebar{position:fixed;left:-224px;z-index:100;transition:left .25s}
  .sidebar.open{left:0}
  #menuBtn{display:flex!important}
  .stats-grid{grid-template-columns:1fr 1fr}
  .content{padding:16px}
  table thead{display:none}
  tbody tr{display:block;padding:10px 0;border-radius:var(--r);margin-bottom:8px;border:1px solid var(--border)!important;background:#fff}
  td{display:flex;justify-content:space-between;padding:6px 14px;font-size:12px}
  td::before{content:attr(data-label);color:var(--ct);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
}
</style>

</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">KAZA<span>.</span></div>
    <div class="login-badge">Painel Administrativo</div>
    <div class="login-fg">
      <label class="login-label" for="adm-email">E-mail</label>
      <input class="login-input" type="email" id="adm-email" placeholder="admin@kazaimoveis.com.br" autocomplete="email">
    </div>
    <div class="login-fg">
      <label class="login-label" for="adm-pass">Senha</label>
      <input class="login-input" type="password" id="adm-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doAdminLogin()">
      <i class="ti ti-lock"></i> Acessar painel
    </button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div>
        <div class="sidebar-logo-text">KAZA<span>.</span></div>
        <div class="sidebar-logo-badge">Admin</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Visão geral</div>
      <button class="nav-item active" onclick="showPage('dashboard')">
        <i class="ti ti-layout-dashboard"></i>Dashboard
      </button>

      <div class="nav-section">Conteúdo</div>
      <button class="nav-item" onclick="showPage('listings')">
        <i class="ti ti-home-2"></i>Imóveis
        <span class="nav-badge" id="pendingBadge" style="display:none">0</span>
      </button>
      <button class="nav-item" onclick="showPage('users')">
        <i class="ti ti-users"></i>Usuários
      </button>
      <button class="nav-item" onclick="showPage('leads')">
        <i class="ti ti-messages"></i>Leads
      </button>

      <div class="nav-section">Plataforma</div>
      <button class="nav-item" onclick="showPage('radar')">
        <i class="ti ti-radar"></i>Radar
      </button>
      <button class="nav-item" onclick="showPage('stories')">
        <i class="ti ti-circle-dashed"></i>Stories
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="adminAvatar">A</div>
        <div>
          <div class="sidebar-user-name" id="adminName">Admin</div>
          <div class="sidebar-user-role">Administrador</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">
        <i class="ti ti-logout"></i>Sair da conta
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;display:none" id="menuBtn">
          <i class="ti ti-menu-2"></i>
        </button>
        <div class="topbar-title" id="pageTitle">Dashboard</div>
      </div>
      <div class="topbar-right">
        <a class="topbar-link" href="https://kaza-site.vercel.app" target="_blank">
          <i class="ti ti-external-link"></i>Ver site
        </a>
      </div>
    </div>
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div>Carregando…</div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const API = 'https://web-production-66119.up.railway.app/api';
let ADM = { token: localStorage.getItem('kaza_admin_token'), user: null };
let currentPage = 'dashboard';
let currentFilter = 'all';

/* ═══════════════════════════════════════
   API
═══════════════════════════════════════ */
async function api(path, opts){
  const h = { 'Content-Type':'application/json' };
  if(ADM.token) h['Authorization'] = 'Bearer ' + ADM.token;
  const method = (opts?.method || 'GET').toUpperCase();
  if(method === 'GET') delete h['Content-Type'];
  const res = await fetch(API + path, { ...opts, headers:{ ...h, ...(opts?.headers) }, mode:'cors' });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || 'Erro ' + res.status);
  return data;
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function toast(msg, type='i'){
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.innerHTML = `<i class="ti ${type==='s'?'ti-check':type==='e'?'ti-alert-circle':'ti-info-circle'}"></i>${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

/* ═══════════════════════════════════════
   AUTH
═══════════════════════════════════════ */
async function doAdminLogin(){
  const email = document.getElementById('adm-email').value.trim();
  const pass  = document.getElementById('adm-pass').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');
  errEl.classList.remove('show');

  if(!email || !pass){ errEl.textContent = 'Preencha e-mail e senha.'; errEl.classList.add('show'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;margin:0;border-width:2px"></div>Entrando…';

  try{
    const res = await api('/auth/login', { method:'POST', body: JSON.stringify({ email, password:pass }) });
    if(!res.user?.is_admin){
      errEl.textContent = 'Acesso restrito a administradores.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-lock"></i>Acessar painel';
      return;
    }
    ADM.token = res.token;
    ADM.user  = res.user;
    localStorage.setItem('kaza_admin_token', res.token);
    initApp();
  } catch(e){
    errEl.textContent = e.message || 'E-mail ou senha incorretos.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-lock"></i>Acessar painel';
  }
}

async function checkSession(){
  if(!ADM.token){ showLogin(); return; }
  try{
    const res = await api('/auth/me');
    if(!res.user?.is_admin){ doLogout(); return; }
    ADM.user = res.user;
    initApp();
  } catch(e){
    localStorage.removeItem('kaza_admin_token');
    showLogin();
  }
}

function showLogin(){
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('show');
  // Enter key
  ['adm-email','adm-pass'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doAdminLogin(); })
  );
}

function initApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  const n = ADM.user.name || ADM.user.email.split('@')[0];
  document.getElementById('adminName').textContent = n;
  document.getElementById('adminAvatar').textContent = n.substring(0,1).toUpperCase();
  showPage('dashboard');
}

function doLogout(){
  localStorage.removeItem('kaza_admin_token');
  ADM = { token:null, user:null };
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('adm-email').value = '';
  document.getElementById('adm-pass').value = '';
  document.getElementById('loginErr').classList.remove('show');
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
const TITLES = {
  dashboard:'Dashboard', listings:'Imóveis', users:'Usuários',
  leads:'Leads', radar:'Radar', stories:'Stories'
};

function showPage(page){
  currentPage = page;
  document.getElementById('pageTitle').textContent = TITLES[page] || page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => {
    if(b.textContent.trim().toLowerCase().startsWith(page)) b.classList.add('active');
  });
  document.getElementById('sidebar').classList.remove('open');
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando…</div>';
  const fns = {
    dashboard: renderDashboard, listings: renderListings,
    users: renderUsers, leads: renderLeads,
    radar: renderRadar, stories: renderStories
  };
  (fns[page] || renderDashboard)();
}

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
async function renderDashboard(){
  const c = document.getElementById('content');
  try{
    const [stats, listings] = await Promise.all([
      api('/admin/stats'),
      api('/admin/listings?limit=5&status=pending'),
    ]);

    // Update badge
    if(stats.pendingListings > 0){
      const b = document.getElementById('pendingBadge');
      b.textContent = stats.pendingListings;
      b.style.display = 'inline-block';
    }

    c.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-users"></i>Usuários</div>
          <div class="stat-n">${stats.totalUsers || 0}</div>
          <div class="stat-sub">cadastrados na plataforma</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-home-2"></i>Imóveis ativos</div>
          <div class="stat-n">${stats.totalListings || 0}</div>
          <div class="stat-sub">publicados agora</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-label"><i class="ti ti-clock"></i>Pendentes</div>
          <div class="stat-n">${stats.pendingListings || 0}</div>
          <div class="stat-sub">${stats.pendingListings > 0
            ? `<span class="stat-trend warn"><i class="ti ti-alert-triangle" style="font-size:10px"></i>Requer revisão</span>`
            : '<span style="color:#15803d;font-size:11px">✓ Tudo em dia</span>'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-messages"></i>Leads</div>
          <div class="stat-n">${stats.totalLeads || 0}</div>
          <div class="stat-sub">contatos recebidos</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-radar"></i>Radar</div>
          <div class="stat-n">${stats.radarSearches || 0}</div>
          <div class="stat-sub">buscas ativas agora</div>
        </div>
      </div>

      ${(listings.listings || []).length > 0 ? `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-clock"></i>Aguardando aprovação <span class="table-count">${(listings.listings||[]).length} imóveis</span></div>
          <button class="filter-btn active" onclick="showPage('listings')">Ver todos</button>
        </div>
        <table>
          <thead><tr><th>Imóvel</th><th>Anunciante</th><th>Cidade</th><th>Ações</th></tr></thead>
          <tbody>${(listings.listings || []).map(l => pendingRow(l)).join('')}</tbody>
        </table>
      </div>` : `
      <div class="table-wrap">
        <div class="table-header"><div class="table-title"><i class="ti ti-check"></i>Aprovações</div></div>
        <div class="empty">
          <div class="empty-icon"><i class="ti ti-circle-check"></i></div>
          <div class="empty-title">Nenhum imóvel pendente</div>
          <div class="empty-sub">Todos os anúncios foram revisados. Quando um novo anúncio for enviado, ele aparecerá aqui para aprovação.</div>
        </div>
      </div>`}
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><div class="empty-icon"><i class="ti ti-alert-circle"></i></div><div class="empty-title">Erro ao carregar</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

function pendingRow(l){
  const img = l.listing_photos?.find(p=>p.is_cover)?.url || l.listing_photos?.[0]?.url || '';
  const adv = l.users || {};
  return `<tr>
    <td class="name">
      <div style="display:flex;align-items:center;gap:10px">
        ${img ? `<img class="listing-thumb" src="${img}" loading="lazy">` : '<div class="listing-thumb"></div>'}
        <div>
          <div>${l.title}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${l.type} · ${l.purpose==='sale'?'Venda':'Aluguel'}</div>
        </div>
      </div>
    </td>
    <td>${adv.name || '—'} ${adv.agency_name?'<span class="badge badge-agency">'+adv.agency_name+'</span>':''}</td>
    <td>${l.city || '—'}</td>
    <td>
      <div class="actions">
        <button class="act approve" onclick="approveListing('${l.id}')"><i class="ti ti-check"></i>Aprovar</button>
        <button class="act reject" onclick="openRejectModal('${l.id}')"><i class="ti ti-x"></i>Rejeitar</button>
      </div>
    </td>
  </tr>`;
}

/* ═══════════════════════════════════════
   LISTINGS
═══════════════════════════════════════ */
async function renderListings(filter){
  const c = document.getElementById('content');
  filter = filter || currentFilter || 'all';
  currentFilter = filter;

  try{
    const q = filter !== 'all' ? `?status=${filter}&limit=100` : '?limit=100';
    const res = await api('/admin/listings' + q);
    const listings = res.listings || [];

    c.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-home-2"></i>Imóveis <span style="class="table-count"">${listings.length} encontrados</span></div>
          <div class="table-filters">
            ${['all','active','pending','paused','sold','rejected'].map(f=>
              `<button class="filter-btn ${currentFilter===f?'active':''}" onclick="renderListings('${f}')">${{all:'Todos',active:'Ativos',pending:'Pendentes',paused:'Pausados',sold:'Vendidos',rejected:'Rejeitados'}[f]}</button>`
            ).join('')}
          </div>
        </div>
        ${listings.length === 0
          ? '<div class="empty"><div class="empty-icon"><i class="ti ti-home-off"></i></div><div class="empty-title">Nenhum imóvel encontrado</div><div class="empty-sub">Tente outro filtro ou aguarde novos anúncios.</div></div>'
          : `<table>
          <thead><tr>
            <th>Imóvel</th><th>Status</th><th>Anunciante</th>
            <th>Cidade</th><th>Preço</th><th>Visitas</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${listings.map(l => listingRow(l)).join('')}
          </tbody>
        </table>`}
      </div>
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><div class="empty-icon"><i class="ti ti-alert-circle"></i></div><div class="empty-title">Erro</div><div class="empty-sub">${e.message}</div>`;
  }
}

function listingRow(l){
  const img = l.listing_photos?.find(p=>p.is_cover)?.url || l.listing_photos?.[0]?.url || '';
  const adv = l.users || {};
  const price = l.price ? (l.price >= 1e6 ? 'R$ '+(l.price/1e6).toFixed(1)+'mi' : 'R$ '+Math.round(l.price/1000)+'mil') : '—';
  const statusBadge = {
    active:'<span class="badge badge-active">Ativo</span>',
    pending:'<span class="badge badge-pending">Pendente</span>',
    paused:'<span class="badge badge-paused">Pausado</span>',
    sold:'<span class="badge badge-sold">Vendido</span>',
    rented:'<span class="badge badge-sold">Alugado</span>',
    rejected:'<span class="badge badge-rejected">Rejeitado</span>',
  }[l.status] || l.status;

  return `<tr>
    <td class="name">
      <div style="display:flex;align-items:center;gap:10px">
        ${img ? `<img class="listing-thumb" src="${img}" loading="lazy">` : '<div class="listing-thumb"></div>'}
        <div>
          <div style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.title}</div>
          <div style="font-size:11px;color:var(--text3)">${l.type}</div>
        </div>
      </div>
    </td>
    <td>${statusBadge} ${l.is_featured?'<span class="badge badge-featured">Destaque</span>':''}</td>
    <td>${adv.name || '—'}</td>
    <td>${l.city || '—'}</td>
    <td>${price}</td>
    <td>${l.views || 0}</td>
    <td>
      <div class="actions">
        ${l.status==='pending'?`
          <button class="act approve" onclick="approveListing('${l.id}')"><i class="ti ti-check"></i>Aprovar</button>
          <button class="act reject" onclick="openRejectModal('${l.id}')"><i class="ti ti-x"></i>Rejeitar</button>
        `:''}
        ${l.status==='active'?`
          <button class="act feature" onclick="featureListing('${l.id}')"><i class="ti ti-star"></i>Destacar</button>
          <button class="act" onclick="patchListing('${l.id}','paused')"><i class="ti ti-player-pause"></i>Pausar</button>
        `:''}
        ${l.status==='paused'?`<button class="act approve" onclick="patchListing('${l.id}','active')"><i class="ti ti-player-play"></i>Reativar</button>`:''}
        <button class="act" onclick='openEditListingModal(${JSON.stringify({id:l.id,title:l.title,price:l.price,city:l.city,neighborhood:l.neighborhood,status:l.status,type:l.type,purpose:l.purpose,bedrooms:l.bedrooms,area_m2:l.area_m2,area_ha:l.area_ha,is_featured:l.is_featured})})' ><i class="ti ti-pencil"></i>Editar</button>
        <button class="act danger" onclick="deleteListing('${l.id}','${l.title.replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button>
      </div>
    </td>
  </tr>`;
}

async function approveListing(id){
  try{
    await api(`/admin/listings/${id}/approve`, {method:'PATCH'});
    toast('Imóvel aprovado e publicado ✓','s');
    renderListings();
    if(currentPage==='dashboard') renderDashboard();
  } catch(e){ toast(e.message,'e'); }
}

function openRejectModal(id){
  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.innerHTML = `<div class="modal">
    <div class="modal-title"><i class="ti ti-x" style="color:var(--danger)"></i>Rejeitar imóvel</div>
    <textarea class="modal-fi" id="rejectReason" rows="3" placeholder="Motivo da rejeição (opcional)"></textarea>
    <div class="modal-actions">
      <button class="modal-btn" onclick="this.closest('.modal-bg').remove()">Cancelar</button>
      <button class="modal-btn primary" onclick="rejectListing('${id}',this)">Rejeitar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

async function rejectListing(id, btn){
  const reason = document.getElementById('rejectReason').value.trim();
  try{
    await api(`/admin/listings/${id}/reject`, {method:'PATCH', body:JSON.stringify({reason})});
    toast('Imóvel rejeitado','i');
    btn.closest('.modal-bg').remove();
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

async function featureListing(id){
  const days = prompt('Destacar por quantos dias? (padrão: 30)', '30');
  if(days === null) return;
  try{
    await api(`/admin/listings/${id}/feature`, {method:'PATCH', body:JSON.stringify({days: +days || 30})});
    toast('Imóvel destacado por ' + (days||30) + ' dias ✓','s');
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

async function patchListing(id, status){
  try{
    await api(`/admin/listings/${id}`, {method:'PATCH', body:JSON.stringify({status})});
    toast('Status atualizado ✓','s');
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

async function deleteListing(id, title){
  if(!confirm(`Deletar permanentemente:\n"${title}"?\n\nEssa ação não pode ser desfeita.`)) return;
  try{
    await api(`/listings/${id}`, {method:'DELETE'});
    toast('Imóvel deletado','i');
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

/* ═══════════════════════════════════════
   USERS
═══════════════════════════════════════ */
async function renderUsers(){
  const c = document.getElementById('content');
  try{
    const res = await api('/admin/users');
    const users = res.users || [];

    c.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-users"></i>Usuários <span style="class="table-count"">${users.length} cadastrados</span></div>
        </div>
        ${users.length===0
          ? '<div class="empty"><div class="empty-icon"><i class="ti ti-users"></i></div><div class="empty-title">Nenhum usuário ainda</div><div class="empty-sub">Os usuários aparecerão aqui após o primeiro cadastro na plataforma.</div></div>'
          : `<table>
          <thead><tr>
            <th>Nome</th><th>E-mail</th><th>Tipo</th>
            <th>CRECI</th><th>Cadastro</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${users.map(u => userRow(u)).join('')}
          </tbody>
        </table>`}
      </div>
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><div class="empty-icon"><i class="ti ti-alert-circle"></i></div><div class="empty-title">Erro</div><div class="empty-sub">${e.message}</div>`;
  }
}

function userRow(u){
  const typeBadge = u.type==='agency' ? '<span class="badge badge-agency">Imobiliária</span>'
    : u.is_admin ? '<span class="badge badge-admin">Admin</span>'
    : '<span style="font-size:12px;color:var(--text3)">Pessoa</span>';
  const date = u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR') : '—';
  return `<tr>
    <td class="name">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--vl);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${(u.name||'U').substring(0,1).toUpperCase()}</div>
        <div>
          ${u.name || '—'}
          ${u.is_verified?'<i class="ti ti-rosette-discount-check" style="color:#4ade80;font-size:13px;margin-left:4px"></i>':''}
        </div>
      </div>
    </td>
    <td style="font-size:12px;color:var(--text3)">${u.email}</td>
    <td>${typeBadge} ${u.agency_name?`<span style="font-size:11px;color:var(--text3)">${u.agency_name}</span>`:''}</td>
    <td style="font-size:11px;color:var(--text3)">${u.creci || '—'}</td>
    <td style="font-size:11px;color:var(--text3)">${date}</td>
    <td>
      <div class="actions">
        <button class="act" onclick='openEditUserModal(${JSON.stringify(u)})'><i class="ti ti-pencil"></i>Editar</button>
        ${!u.is_verified?`<button class="act verify" onclick="verifyUser('${u.id}')"><i class="ti ti-rosette-discount-check"></i>Verificar</button>`:''}
        ${!u.is_admin?`<button class="act" onclick="makeAdmin('${u.id}','${(u.name||'').replace(/'/g,"\\'")}')"><i class="ti ti-shield"></i>Admin</button>`:''}
        <button class="act danger" onclick="deleteUser('${u.id}','${(u.name||'').replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button>
      </div>
    </td>
  </tr>`;
}

async function verifyUser(id){
  try{
    await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify({is_verified:true})});
    toast('Usuário verificado ✓','s');
    renderUsers();
  } catch(e){ toast(e.message,'e'); }
}

async function makeAdmin(id, name){
  if(!confirm(`Tornar "${name}" administrador?\nEle terá acesso total ao painel.`)) return;
  try{
    await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify({is_admin:true})});
    toast('Usuário promovido a admin ✓','s');
    renderUsers();
  } catch(e){ toast(e.message,'e'); }
}

/* ═══════════════════════════════════════
   LEADS
═══════════════════════════════════════ */
async function renderLeads(){
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando leads…</div>';
  try{
    const res = await api('/admin/leads?limit=100');
    const leads = res.leads || [];
    const unread = leads.filter(l => !l.is_read).length;

    c.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">
            <i class="ti ti-messages"></i>Leads recebidos
            <span style="class="table-count"">${res.total || leads.length} total</span>
            ${unread > 0 ? `<span class="nav-badge">${unread} novos</span>` : ''}
          </div>
          <div class="table-filters">
            <button class="filter-btn active" id="fAll" onclick="filterLeads('all',this)">Todos</button>
            <button class="filter-btn" id="fNew" onclick="filterLeads('new',this)">Não lidos</button>
            <button class="filter-btn" id="fRead" onclick="filterLeads('read',this)">Lidos</button>
          </div>
        </div>
        ${leads.length === 0
          ? '<div class="empty"><div class="empty-icon"><i class="ti ti-messages"></i></div><div class="empty-title">Nenhum lead ainda</div><div class="empty-sub">Quando alguém entrar em contato com um anunciante, os leads aparecerão aqui.</div></div>'
          : `<table id="leadsTable">
            <thead><tr>
              <th></th><th>Contato</th><th>Mensagem</th>
              <th>Imóvel</th><th>Anunciante</th><th>Data</th><th>Ações</th>
            </tr></thead>
            <tbody>
              ${leads.map(lead => leadRow(lead)).join('')}
            </tbody>
          </table>`}
      </div>
    `;
    window._leads = leads;
  } catch(e){
    c.innerHTML = `<div class="empty"><div class="empty-icon"><i class="ti ti-alert-circle"></i></div><div class="empty-title">Erro</div><div class="empty-sub">${e.message}</div>`;
  }
}

function leadRow(l){
  const listing = l.listings || {};
  const advertiser = listing.users || {};
  const date = l.created_at ? new Date(l.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  const waLink = l.phone ? `https://wa.me/${l.phone.replace(/\D/g,'')}` : null;
  return `<tr id="lead-${l.id}" style="opacity:${l.is_read?'0.6':'1'}">
    <td><div style="width:8px;height:8px;border-radius:50%;background:${l.is_read?'transparent':'var(--info)'};border:1px solid ${l.is_read?'var(--border)':'var(--info)'};margin:0 auto"></div></td>
    <td class="name">
      <div style="font-weight:600">${l.name || '—'}</div>
      ${l.email ? `<div style="font-size:11px;color:var(--text3)">${l.email}</div>` : ''}
      ${waLink ? `<a href="${waLink}" target="_blank" style="font-size:11px;color:#4ade80;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-brand-whatsapp"></i>${l.phone}</a>` : ''}
    </td>
    <td style="max-width:200px;font-size:12px;color:var(--text2)">
      <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">${l.message || '<span style="color:var(--text3)">Sem mensagem</span>'}</div>
    </td>
    <td style="font-size:12px;color:var(--text3);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${listing.title || '—'}</td>
    <td style="font-size:12px;color:var(--text3)">${advertiser.name || advertiser.agency_name || '—'}</td>
    <td style="font-size:11px;color:var(--text3);white-space:nowrap">${date}</td>
    <td>
      ${!l.is_read ? `<button class="act verify" onclick="markLeadRead('${l.id}')"><i class="ti ti-check"></i>Lido</button>` : ''}
    </td>
  </tr>`;
}

function filterLeads(filter, btn){
  document.querySelectorAll('#fAll,#fNew,#fRead').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const leads = window._leads || [];
  const filtered = filter === 'new' ? leads.filter(l=>!l.is_read)
    : filter === 'read' ? leads.filter(l=>l.is_read)
    : leads;
  const tbody = document.querySelector('#leadsTable tbody');
  if(tbody) tbody.innerHTML = filtered.map(leadRow).join('');
}

async function markLeadRead(id){
  try{
    await api(`/admin/leads/${id}/read`, {method:'PATCH'});
    const row = document.getElementById('lead-'+id);
    if(row){ row.style.opacity='0.6'; row.querySelector('.act.verify')?.remove(); row.querySelector('div[style*="var(--info)"]')?.setAttribute('style','width:8px;height:8px;border-radius:50%;background:transparent;border:1px solid var(--border);margin:0 auto'); }
    if(window._leads){ const l = window._leads.find(x=>x.id===id); if(l) l.is_read=true; }
    toast('Lead marcado como lido','s');
  } catch(e){ toast(e.message,'e'); }
}

/* ═══════════════════════════════════════
   RADAR
═══════════════════════════════════════ */
async function renderRadar(){
  const c = document.getElementById('content');
  try{
    const [stats, demand] = await Promise.allSettled([
      api('/admin/stats'),
      api('/radar/demand'),
    ]);

    const s = stats.status === 'fulfilled' ? stats.value : {};
    const d = demand.status === 'fulfilled' ? demand.value : {};

    c.innerHTML = `
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-radar"></i>Buscas ativas</div>
          <div class="stat-n">${s.radarSearches || 0}</div>
          <div class="stat-sub">compradores/locatários monitorando</div>
        </div>
        ${d.byType ? Object.entries(d.byType).map(([type, count]) =>
          `<div class="stat-card">
            <div class="stat-label"><i class="ti ti-tag"></i>${{residential:'Residencial',rural:'Rural',lot:'Lote',commercial:'Comercial'}[type]||type}</div>
            <div class="stat-n">${count}</div>
            <div class="stat-sub">buscas ativas</div>
          </div>`
        ).join('') : ''}
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-radar"></i>Buscas recentes no Radar</div>
        </div>
        <div id="radarSearchesArea" style="padding:20px">
          <div class="spinner"></div>
        </div>
      </div>
    `;

    // Load searches
    try{
      const searches = await api('/radar/searches?limit=20');
      const items = searches.searches || searches.data || [];
      if(!items.length){
        document.getElementById('radarSearchesArea').innerHTML = '<div class="empty" style="padding:20px 0"><i class="ti ti-radar-off"></i>Nenhuma busca ativa.</div>';
        return;
      }
      document.getElementById('radarSearchesArea').innerHTML = items.map(s => `
        <div class="radar-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="font-weight:600;font-size:13px">${s.name || 'Visitante'}</div>
            <div style="font-size:11px;color:var(--text3)">${s.phone || ''}</div>
          </div>
          <div class="radar-card-row">
            ${s.type?`<span class="radar-tag">${s.type}</span>`:''}
            ${s.purpose?`<span class="radar-tag">${s.purpose==='sale'?'Compra':'Aluguel'}</span>`:''}
            ${s.city?`<span class="radar-tag">${s.city}</span>`:''}
            ${s.max_price?`<span class="radar-tag">Até R$ ${(s.max_price/1000).toFixed(0)}mil</span>`:''}
          </div>
        </div>
      `).join('');
    } catch(e){
      document.getElementById('radarSearchesArea').innerHTML = '<div class="empty" style="padding:20px 0"><i class="ti ti-info-circle"></i>Rota /radar/searches não disponível. Adicione no backend para visualizar buscas.</div>';
    }
  } catch(e){
    c.innerHTML = `<div class="empty"><div class="empty-icon"><i class="ti ti-alert-circle"></i></div><div class="empty-title">Erro</div><div class="empty-sub">${e.message}</div>`;
  }
}

/* ═══════════════════════════════════════
   STORIES
═══════════════════════════════════════ */
async function renderStories(){
  const c = document.getElementById('content');
  try{
    const res = await api('/stories');
    const stories = res.stories || [];

    c.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-circle-dashed"></i>Stories publicados <span style="class="table-count"">${stories.length} ativos</span></div>
        </div>
        ${stories.length===0
          ? '<div class="empty"><div class="empty-icon"><i class="ti ti-circle-dashed"></i></div><div class="empty-title">Nenhum story publicado</div><div class="empty-sub">Quando anunciantes postarem vídeos dos seus imóveis, eles aparecerão aqui para moderação.</div></div>'
          : `<table>
          <thead><tr>
            <th>Thumb</th><th>Anunciante</th><th>Imóvel vinculado</th>
            <th>Legenda</th><th>Visualizações</th><th>Expira</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${stories.map(s => storyRow(s)).join('')}
          </tbody>
        </table>`}
      </div>
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><div class="empty-icon"><i class="ti ti-alert-circle"></i></div><div class="empty-title">Erro</div><div class="empty-sub">${e.message}</div>`;
  }
}

function storyRow(s){
  const adv = s.users || {};
  const listing = s.listings;
  const expires = s.expires_at ? new Date(s.expires_at).toLocaleDateString('pt-BR') : '—';
  return `<tr>
    <td>${s.thumb_url?`<img class="listing-thumb" src="${s.thumb_url}" loading="lazy" style="width:40px;height:64px;border-radius:6px">`:
      '<div class="listing-thumb" style="height:64px;width:40px"></div>'}</td>
    <td class="name">${adv.name || adv.agency_name || '—'}</td>
    <td style="font-size:12px;color:var(--text3)">${listing?.title || '<span style="color:var(--text3)">Sem vínculo</span>'}</td>
    <td style="font-size:12px;color:var(--text3);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.caption || '—'}</td>
    <td>${s.views || 0}</td>
    <td style="font-size:11px;color:var(--text3)">${expires}</td>
    <td>
      <button class="act danger" onclick="deleteStory('${s.id}')"><i class="ti ti-trash"></i>Remover</button>
    </td>
  </tr>`;
}

async function deleteStory(id){
  if(!confirm('Remover este story?')) return;
  try{
    await api(`/stories/${id}`, {method:'DELETE'});
    toast('Story removido','i');
    renderStories();
  } catch(e){ toast(e.message,'e'); }
}

function openEditUserModal(u){
  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.innerHTML = `<div class="modal" style="max-width:500px">
    <div class="modal-title"><i class="ti ti-user-edit" style="color:var(--tl)"></i>Editar usuário</div>

    <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Nome</label>
    <input class="modal-fi" id="eu_name" value="${u.name||''}" placeholder="Nome completo">

    <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">WhatsApp / Telefone</label>
    <input class="modal-fi" id="eu_phone" value="${u.phone||''}" placeholder="(77) 9...">

    <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Nome da Imobiliária</label>
    <input class="modal-fi" id="eu_agency" value="${u.agency_name||''}" placeholder="Opcional">

    <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">CRECI</label>
    <input class="modal-fi" id="eu_creci" value="${u.creci||''}" placeholder="Opcional">

    <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Tipo</label>
    <select class="modal-fi" id="eu_type" style="margin-bottom:4px">
      <option value="person" ${u.type==='person'?'selected':''}>Pessoa</option>
      <option value="agency" ${u.type==='agency'?'selected':''}>Imobiliária</option>
    </select>

    <div style="display:flex;align-items:center;gap:8px;margin:10px 0 16px">
      <input type="checkbox" id="eu_verified" ${u.is_verified?'checked':''} style="width:15px;height:15px;accent-color:var(--t)">
      <label for="eu_verified" style="font-size:13px;color:var(--text2);cursor:pointer">Usuário verificado</label>
    </div>

    <div class="modal-actions">
      <button class="modal-btn" onclick="this.closest('.modal-bg').remove()">Cancelar</button>
      <button class="modal-btn primary" onclick="saveUser('${u.id}',this)"><i class="ti ti-check"></i>Salvar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

async function saveUser(id, btn){
  const updates = {
    name:        document.getElementById('eu_name').value.trim(),
    phone:       document.getElementById('eu_phone').value.trim(),
    agency_name: document.getElementById('eu_agency').value.trim() || null,
    creci:       document.getElementById('eu_creci').value.trim() || null,
    type:        document.getElementById('eu_type').value,
    is_verified: document.getElementById('eu_verified').checked,
  };
  if(!updates.name){ toast('Nome é obrigatório','e'); return; }
  btn.disabled = true; btn.textContent = 'Salvando…';
  try{
    await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify(updates)});
    toast('Usuário atualizado ✓','s');
    btn.closest('.modal-bg').remove();
    renderUsers();
  } catch(e){ toast(e.message,'e'); btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i>Salvar'; }
}

async function deleteUser(id, name){
  if(!confirm(`Excluir permanentemente o usuário:\n"${name}"?\n\nTodos os anúncios desse usuário também serão removidos.\nEssa ação não pode ser desfeita.`)) return;
  try{
    await api(`/admin/users/${id}`, {method:'DELETE'});
    toast('Usuário excluído','i');
    renderUsers();
  } catch(e){ toast(e.message,'e'); }
}

function openEditListingModal(l){

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div>
        <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Preço (R$)</label>

        <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Cidade</label>
        <input class="modal-fi" id="el_city" value="${l.city||''}" placeholder="Barreiras">
      </div>
      <div>
        <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Bairro</label>
        <input class="modal-fi" id="el_neigh" value="${l.neighborhood||''}" placeholder="Bairro / Localidade">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div>
        <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Tipo</label>
        <select class="modal-fi" id="el_type">
          ${['residential','rural','lot','commercial'].map(t=>
            `<option value="${t}" ${l.type===t?'selected':''}>${{residential:'Residencial',rural:'Rural',lot:'Lote',commercial:'Comercial'}[t]}</option>`
          ).join('')}

          <option value="sale" ${l.purpose==='sale'?'selected':''}>Venda</option>

        </select>
      </div>
      <div>
        <label class="login-label" style="font-size:10px;color:var(--text3);margin-bottom:5px;display:block">Quartos</label>

async function saveListing(id, btn){

  if(!title){ toast('Título é obrigatório','e'); return; }
  const updates = {
    title,
    price:        parseFloat(document.getElementById('el_price').value) || null,
    status:       document.getElementById('el_status').value,
    city:         document.getElementById('el_city').value.trim(),
    neighborhood: document.getElementById('el_neigh').value.trim() || null,
    type:         document.getElementById('el_type').value,
    purpose:      document.getElementById('el_purpose').value,
    bedrooms:     parseInt(document.getElementById('el_beds').value) || null,
    area_m2:      parseFloat(document.getElementById('el_area').value) || null,
    area_ha:      parseFloat(document.getElementById('el_ha').value) || null,
    is_featured:  document.getElementById('el_featured').checked,
  };
  btn.disabled = true; btn.textContent = 'Salvando…';
  try{
    await api(`/admin/listings/${id}`, {method:'PATCH', body:JSON.stringify(updates)});
    toast('Imóvel atualizado ✓','s');
    btn.closest('.modal-bg').remove();
    renderListings();
  } catch(e){ toast(e.message,'e'); btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i>Salvar alterações'; }
}
