<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>KAZA Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#1E3A2F;--vd:#152a22;--vl:#2a4d3f;
  --t:#C4622D;--tl:#E8845A;
  --bg:#0f1a15;--bg2:#182519;--bg3:#1e2e22;
  --border:rgba(255,255,255,.07);
  --text:#e8f0e9;--text2:rgba(232,240,233,.55);--text3:rgba(232,240,233,.3);
  --card:#1a2b1e;--card2:#1f3224;
  --success:#22c55e;--warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --r:10px;--r-sm:6px;
  --font:'DM Sans',sans-serif;--fd:'Playfair Display',serif;
  --sh:0 2px 12px rgba(0,0,0,.4);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}

/* ── Login ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(30,58,47,.4),transparent);
}
.login-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:40px;width:100%;max-width:380px;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.login-logo{font-family:var(--fd);font-size:1.6rem;color:var(--text);margin-bottom:4px}
.login-logo span{color:var(--t)}
.login-badge{display:inline-block;background:rgba(196,98,45,.15);color:var(--tl);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:4px;border:1px solid rgba(196,98,45,.2);margin-bottom:28px}
.login-fg{margin-bottom:16px}
.login-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:7px}
.login-input{
  width:100%;padding:11px 14px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--bg2);
  color:var(--text);font-size:14px;outline:none;
  transition:border-color .15s;
}
.login-input:focus{border-color:rgba(196,98,45,.5);box-shadow:0 0 0 3px rgba(196,98,45,.1)}
.login-btn{
  width:100%;padding:12px;border-radius:var(--r-sm);border:none;
  background:var(--t);color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;transition:filter .15s;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-btn:hover{filter:brightness(1.1)}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;border-radius:var(--r-sm);padding:10px 14px;font-size:13px;margin-top:12px;display:none}
.login-err.show{display:block}

/* ── App shell ── */
#app{display:none;height:100vh;overflow:hidden}
#app.show{display:flex}

/* Sidebar */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;
}
.sidebar-logo{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo-text{font-family:var(--fd);font-size:1.1rem;color:var(--text)}
.sidebar-logo-text span{color:var(--t)}
.sidebar-logo-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:rgba(196,98,45,.2);color:var(--tl);padding:2px 7px;border-radius:3px}
.sidebar-nav{flex:1;padding:12px 0}
.nav-section{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:8px 16px 4px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;border-radius:0;color:var(--text2);
  cursor:pointer;transition:all .15s;border:none;background:none;
  width:100%;text-align:left;font-size:13px;
}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-item.active{background:rgba(196,98,45,.1);color:var(--tl);border-right:2px solid var(--t)}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--t);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-user-name{font-size:13px;font-weight:500;color:var(--text)}
.sidebar-user-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.logout-btn{
  width:100%;padding:8px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:none;color:var(--text2);
  font-size:12px;display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:all .15s;
}
.logout-btn:hover{border-color:rgba(239,68,68,.4);color:#fca5a5}

/* Main */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{
  padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-link{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;transition:color .15s}
.topbar-link:hover{color:var(--tl)}
.content{padding:24px;flex:1}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 18px;
  transition:border-color .15s;
}
.stat-card:hover{border-color:rgba(196,98,45,.2)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-label i{font-size:14px}
.stat-n{font-family:var(--fd);font-size:1.8rem;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-card.accent{border-color:rgba(196,98,45,.25);background:rgba(196,98,45,.06)}
.stat-card.accent .stat-n{color:var(--tl)}

/* Tables */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-wrap:wrap;
}
.table-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.table-title i{color:var(--tl)}
.table-filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{
  padding:5px 12px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:none;color:var(--text2);font-size:12px;cursor:pointer;
  transition:all .15s;
}
.filter-btn:hover,.filter-btn.active{background:rgba(196,98,45,.12);border-color:rgba(196,98,45,.35);color:var(--tl)}
table{width:100%;border-collapse:collapse}
thead th{
  padding:10px 16px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:12px 16px;font-size:13px;color:var(--text2);vertical-align:middle}
td.name{color:var(--text);font-weight:500}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.badge-active{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.badge-pending{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.badge-rejected{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.badge-sold{background:rgba(59,130,246,.1);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
.badge-paused{background:rgba(107,114,128,.1);color:#9ca3af;border:1px solid rgba(107,114,128,.2)}
.badge-featured{background:rgba(196,98,45,.12);color:var(--tl);border:1px solid rgba(196,98,45,.25)}
.badge-agency{background:rgba(30,58,47,.4);color:#86efac;border:1px solid rgba(30,58,47,.6)}
.badge-admin{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}

/* Action buttons */
.actions{display:flex;gap:6px;flex-wrap:wrap}
.act{
  padding:5px 10px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:none;color:var(--text2);font-size:12px;
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.act:hover{background:rgba(255,255,255,.05);color:var(--text)}
.act.approve{color:#4ade80;border-color:rgba(34,197,94,.25)}
.act.approve:hover{background:rgba(34,197,94,.1)}
.act.reject{color:#fca5a5;border-color:rgba(239,68,68,.25)}
.act.reject:hover{background:rgba(239,68,68,.1)}
.act.feature{color:var(--tl);border-color:rgba(196,98,45,.3)}
.act.feature:hover{background:rgba(196,98,45,.1)}
.act.danger{color:#fca5a5}
.act.verify{color:#93c5fd;border-color:rgba(59,130,246,.25)}
.act.verify:hover{background:rgba(59,130,246,.1)}

/* Empty / loading */
.empty{padding:40px;text-align:center;color:var(--text3)}
.empty i{font-size:32px;margin-bottom:12px;display:block}
.loading{padding:40px;text-align:center;color:var(--text3)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--t);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#toast{
  position:fixed;bottom:20px;right:20px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;
  pointer-events:none;
}
.toast-item{
  background:var(--card2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 16px;
  font-size:13px;color:var(--text);
  box-shadow:var(--sh);
  animation:toastIn .2s ease;
  display:flex;align-items:center;gap:8px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.toast-s{border-left:3px solid var(--success)}
.toast-e{border-left:3px solid var(--danger)}
.toast-i{border-left:3px solid var(--info)}

/* Modal */
.modal-bg{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:24px;
  width:100%;max-width:440px;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-fi{width:100%;padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
.modal-fi:focus{border-color:rgba(196,98,45,.4)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.modal-btn{padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text2);transition:all .15s}
.modal-btn.primary{background:var(--t);border-color:var(--t);color:#fff}
.modal-btn.primary:hover{filter:brightness(1.1)}
.modal-btn:hover{background:rgba(255,255,255,.05)}

/* Photo thumb */
.listing-thumb{width:48px;height:36px;border-radius:4px;object-fit:cover;background:var(--bg3)}

/* Radar card */
.radar-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.radar-card-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.radar-tag{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.05);color:var(--text2);padding:2px 8px;border-radius:4px}

/* Scroll */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

/* Responsive sidebar */
@media(max-width:768px){
  .sidebar{position:fixed;left:-220px;z-index:100;transition:left .25s}
  .sidebar.open{left:0}
  #app.show{flex-direction:column}
  .stats-grid{grid-template-columns:1fr 1fr}
  table thead{display:none}
  tbody tr{display:block;padding:8px 0;margin-bottom:4px}
  td{display:block;padding:4px 16px}
}
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">KAZA<span>.</span></div>
    <div class="login-badge">Painel Administrativo</div>
    <div class="login-fg">
      <label class="login-label" for="adm-email">E-mail</label>
      <input class="login-input" type="email" id="adm-email" placeholder="admin@kazaimoveis.com.br" autocomplete="email">
    </div>
    <div class="login-fg">
      <label class="login-label" for="adm-pass">Senha</label>
      <input class="login-input" type="password" id="adm-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doAdminLogin()">
      <i class="ti ti-lock"></i> Acessar painel
    </button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div>
        <div class="sidebar-logo-text">KAZA<span>.</span></div>
        <div class="sidebar-logo-badge">Admin</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Visão geral</div>
      <button class="nav-item active" onclick="showPage('dashboard')">
        <i class="ti ti-layout-dashboard"></i>Dashboard
      </button>

      <div class="nav-section">Conteúdo</div>
      <button class="nav-item" onclick="showPage('listings')">
        <i class="ti ti-home-2"></i>Imóveis
        <span class="nav-badge" id="pendingBadge" style="display:none">0</span>
      </button>
      <button class="nav-item" onclick="showPage('users')">
        <i class="ti ti-users"></i>Usuários
      </button>
      <button class="nav-item" onclick="showPage('leads')">
        <i class="ti ti-messages"></i>Leads
      </button>

      <div class="nav-section">Plataforma</div>
      <button class="nav-item" onclick="showPage('radar')">
        <i class="ti ti-radar"></i>Radar
      </button>
      <button class="nav-item" onclick="showPage('stories')">
        <i class="ti ti-circle-dashed"></i>Stories
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="adminAvatar">A</div>
        <div>
          <div class="sidebar-user-name" id="adminName">Admin</div>
          <div class="sidebar-user-role">Administrador</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">
        <i class="ti ti-logout"></i>Sair da conta
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;display:none" id="menuBtn">
          <i class="ti ti-menu-2"></i>
        </button>
        <div class="topbar-title" id="pageTitle">Dashboard</div>
      </div>
      <div class="topbar-right">
        <a class="topbar-link" href="https://kaza-site.vercel.app" target="_blank">
          <i class="ti ti-external-link"></i>Ver site
        </a>
      </div>
    </div>
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div>Carregando…</div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const API = 'https://web-production-66119.up.railway.app/api';
let ADM = { token: localStorage.getItem('kaza_admin_token'), user: null };
let currentPage = 'dashboard';
let currentFilter = 'all';

/* ═══════════════════════════════════════
   API
═══════════════════════════════════════ */
async function api(path, opts){
  const h = { 'Content-Type':'application/json' };
  if(ADM.token) h['Authorization'] = 'Bearer ' + ADM.token;
  const method = (opts?.method || 'GET').toUpperCase();
  if(method === 'GET') delete h['Content-Type'];
  const res = await fetch(API + path, { ...opts, headers:{ ...h, ...(opts?.headers) }, mode:'cors' });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || 'Erro ' + res.status);
  return data;
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
function toast(msg, type='i'){
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.innerHTML = `<i class="ti ${type==='s'?'ti-check':type==='e'?'ti-alert-circle':'ti-info-circle'}"></i>${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

/* ═══════════════════════════════════════
   AUTH
═══════════════════════════════════════ */
async function doAdminLogin(){
  const email = document.getElementById('adm-email').value.trim();
  const pass  = document.getElementById('adm-pass').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');
  errEl.classList.remove('show');

  if(!email || !pass){ errEl.textContent = 'Preencha e-mail e senha.'; errEl.classList.add('show'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;margin:0;border-width:2px"></div>Entrando…';

  try{
    const res = await api('/auth/login', { method:'POST', body: JSON.stringify({ email, password:pass }) });
    if(!res.user?.is_admin){
      errEl.textContent = 'Acesso restrito a administradores.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-lock"></i>Acessar painel';
      return;
    }
    ADM.token = res.token;
    ADM.user  = res.user;
    localStorage.setItem('kaza_admin_token', res.token);
    initApp();
  } catch(e){
    errEl.textContent = e.message || 'E-mail ou senha incorretos.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-lock"></i>Acessar painel';
  }
}

async function checkSession(){
  if(!ADM.token){ showLogin(); return; }
  try{
    const res = await api('/auth/me');
    if(!res.user?.is_admin){ doLogout(); return; }
    ADM.user = res.user;
    initApp();
  } catch(e){
    localStorage.removeItem('kaza_admin_token');
    showLogin();
  }
}

function showLogin(){
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('show');
  // Enter key
  ['adm-email','adm-pass'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doAdminLogin(); })
  );
}

function initApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  const n = ADM.user.name || ADM.user.email.split('@')[0];
  document.getElementById('adminName').textContent = n;
  document.getElementById('adminAvatar').textContent = n.substring(0,1).toUpperCase();
  showPage('dashboard');
}

function doLogout(){
  localStorage.removeItem('kaza_admin_token');
  ADM = { token:null, user:null };
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('adm-email').value = '';
  document.getElementById('adm-pass').value = '';
  document.getElementById('loginErr').classList.remove('show');
}

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
const TITLES = {
  dashboard:'Dashboard', listings:'Imóveis', users:'Usuários',
  leads:'Leads', radar:'Radar', stories:'Stories'
};

function showPage(page){
  currentPage = page;
  document.getElementById('pageTitle').textContent = TITLES[page] || page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => {
    if(b.textContent.trim().toLowerCase().startsWith(page)) b.classList.add('active');
  });
  document.getElementById('sidebar').classList.remove('open');
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading"><div class="spinner"></div>Carregando…</div>';
  const fns = {
    dashboard: renderDashboard, listings: renderListings,
    users: renderUsers, leads: renderLeads,
    radar: renderRadar, stories: renderStories
  };
  (fns[page] || renderDashboard)();
}

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
async function renderDashboard(){
  const c = document.getElementById('content');
  try{
    const [stats, listings] = await Promise.all([
      api('/admin/stats'),
      api('/admin/listings?limit=5&status=pending'),
    ]);

    // Update badge
    if(stats.pendingListings > 0){
      const b = document.getElementById('pendingBadge');
      b.textContent = stats.pendingListings;
      b.style.display = 'inline-block';
    }

    c.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-users"></i>Usuários</div>
          <div class="stat-n">${stats.totalUsers || 0}</div>
          <div class="stat-sub">cadastrados</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-home-2"></i>Imóveis ativos</div>
          <div class="stat-n">${stats.totalListings || 0}</div>
          <div class="stat-sub">publicados</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-label"><i class="ti ti-clock"></i>Pendentes</div>
          <div class="stat-n">${stats.pendingListings || 0}</div>
          <div class="stat-sub">aguardando aprovação</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-messages"></i>Leads</div>
          <div class="stat-n">${stats.totalLeads || 0}</div>
          <div class="stat-sub">contatos recebidos</div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-radar"></i>Radar ativo</div>
          <div class="stat-n">${stats.radarSearches || 0}</div>
          <div class="stat-sub">buscas ativas</div>
        </div>
      </div>

      ${(listings.listings || []).length > 0 ? `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-clock"></i>Pendentes de aprovação</div>
          <button class="filter-btn" onclick="showPage('listings')">Ver todos →</button>
        </div>
        <table>
          <thead><tr>
            <th>Imóvel</th><th>Anunciante</th><th>Cidade</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${(listings.listings || []).map(l => pendingRow(l)).join('')}
          </tbody>
        </table>
      </div>` : `
      <div class="table-wrap">
        <div class="table-header"><div class="table-title"><i class="ti ti-check"></i>Sem pendências</div></div>
        <div class="empty"><i class="ti ti-circle-check"></i>Todos os imóveis foram revisados.</div>
      </div>`}
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><i class="ti ti-alert-circle"></i>Erro ao carregar dados: ${e.message}</div>`;
  }
}

function pendingRow(l){
  const img = l.listing_photos?.find(p=>p.is_cover)?.url || l.listing_photos?.[0]?.url || '';
  const adv = l.users || {};
  return `<tr>
    <td class="name">
      <div style="display:flex;align-items:center;gap:10px">
        ${img ? `<img class="listing-thumb" src="${img}" loading="lazy">` : '<div class="listing-thumb"></div>'}
        <div>
          <div>${l.title}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${l.type} · ${l.purpose==='sale'?'Venda':'Aluguel'}</div>
        </div>
      </div>
    </td>
    <td>${adv.name || '—'} ${adv.agency_name?'<span class="badge badge-agency">'+adv.agency_name+'</span>':''}</td>
    <td>${l.city || '—'}</td>
    <td>
      <div class="actions">
        <button class="act approve" onclick="approveListing('${l.id}')"><i class="ti ti-check"></i>Aprovar</button>
        <button class="act reject" onclick="openRejectModal('${l.id}')"><i class="ti ti-x"></i>Rejeitar</button>
      </div>
    </td>
  </tr>`;
}

/* ═══════════════════════════════════════
   LISTINGS
═══════════════════════════════════════ */
async function renderListings(filter){
  const c = document.getElementById('content');
  filter = filter || currentFilter || 'all';
  currentFilter = filter;

  try{
    const q = filter !== 'all' ? `?status=${filter}&limit=100` : '?limit=100';
    const res = await api('/admin/listings' + q);
    const listings = res.listings || [];

    c.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-home-2"></i>Imóveis <span style="color:var(--text3);font-size:12px">${listings.length} encontrados</span></div>
          <div class="table-filters">
            ${['all','active','pending','paused','sold','rejected'].map(f=>
              `<button class="filter-btn ${currentFilter===f?'active':''}" onclick="renderListings('${f}')">${{all:'Todos',active:'Ativos',pending:'Pendentes',paused:'Pausados',sold:'Vendidos',rejected:'Rejeitados'}[f]}</button>`
            ).join('')}
          </div>
        </div>
        ${listings.length === 0
          ? '<div class="empty"><i class="ti ti-home-off"></i>Nenhum imóvel neste filtro.</div>'
          : `<table>
          <thead><tr>
            <th>Imóvel</th><th>Status</th><th>Anunciante</th>
            <th>Cidade</th><th>Preço</th><th>Visitas</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${listings.map(l => listingRow(l)).join('')}
          </tbody>
        </table>`}
      </div>
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><i class="ti ti-alert-circle"></i>${e.message}</div>`;
  }
}

function listingRow(l){
  const img = l.listing_photos?.find(p=>p.is_cover)?.url || l.listing_photos?.[0]?.url || '';
  const adv = l.users || {};
  const price = l.price ? (l.price >= 1e6 ? 'R$ '+(l.price/1e6).toFixed(1)+'mi' : 'R$ '+Math.round(l.price/1000)+'mil') : '—';
  const statusBadge = {
    active:'<span class="badge badge-active">Ativo</span>',
    pending:'<span class="badge badge-pending">Pendente</span>',
    paused:'<span class="badge badge-paused">Pausado</span>',
    sold:'<span class="badge badge-sold">Vendido</span>',
    rented:'<span class="badge badge-sold">Alugado</span>',
    rejected:'<span class="badge badge-rejected">Rejeitado</span>',
  }[l.status] || l.status;

  return `<tr>
    <td class="name">
      <div style="display:flex;align-items:center;gap:10px">
        ${img ? `<img class="listing-thumb" src="${img}" loading="lazy">` : '<div class="listing-thumb"></div>'}
        <div>
          <div style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.title}</div>
          <div style="font-size:11px;color:var(--text3)">${l.type}</div>
        </div>
      </div>
    </td>
    <td>${statusBadge} ${l.is_featured?'<span class="badge badge-featured">Destaque</span>':''}</td>
    <td>${adv.name || '—'}</td>
    <td>${l.city || '—'}</td>
    <td>${price}</td>
    <td>${l.views || 0}</td>
    <td>
      <div class="actions">
        ${l.status==='pending'?`
          <button class="act approve" onclick="approveListing('${l.id}')"><i class="ti ti-check"></i>Aprovar</button>
          <button class="act reject" onclick="openRejectModal('${l.id}')"><i class="ti ti-x"></i>Rejeitar</button>
        `:''}
        ${l.status==='active'?`
          <button class="act feature" onclick="featureListing('${l.id}')"><i class="ti ti-star"></i>Destacar</button>
          <button class="act" onclick="patchListing('${l.id}','paused')"><i class="ti ti-player-pause"></i>Pausar</button>
        `:''}
        ${l.status==='paused'?`<button class="act approve" onclick="patchListing('${l.id}','active')"><i class="ti ti-player-play"></i>Reativar</button>`:''}
        <button class="act danger" onclick="deleteListing('${l.id}','${l.title.replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button>
      </div>
    </td>
  </tr>`;
}

async function approveListing(id){
  try{
    await api(`/admin/listings/${id}/approve`, {method:'PATCH'});
    toast('Imóvel aprovado e publicado ✓','s');
    renderListings();
    if(currentPage==='dashboard') renderDashboard();
  } catch(e){ toast(e.message,'e'); }
}

function openRejectModal(id){
  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.innerHTML = `<div class="modal">
    <div class="modal-title"><i class="ti ti-x" style="color:var(--danger)"></i>Rejeitar imóvel</div>
    <textarea class="modal-fi" id="rejectReason" rows="3" placeholder="Motivo da rejeição (opcional)"></textarea>
    <div class="modal-actions">
      <button class="modal-btn" onclick="this.closest('.modal-bg').remove()">Cancelar</button>
      <button class="modal-btn primary" onclick="rejectListing('${id}',this)">Rejeitar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

async function rejectListing(id, btn){
  const reason = document.getElementById('rejectReason').value.trim();
  try{
    await api(`/admin/listings/${id}/reject`, {method:'PATCH', body:JSON.stringify({reason})});
    toast('Imóvel rejeitado','i');
    btn.closest('.modal-bg').remove();
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

async function featureListing(id){
  const days = prompt('Destacar por quantos dias? (padrão: 30)', '30');
  if(days === null) return;
  try{
    await api(`/admin/listings/${id}/feature`, {method:'PATCH', body:JSON.stringify({days: +days || 30})});
    toast('Imóvel destacado por ' + (days||30) + ' dias ✓','s');
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

async function patchListing(id, status){
  try{
    await api(`/admin/listings/${id}`, {method:'PATCH', body:JSON.stringify({status})});
    toast('Status atualizado ✓','s');
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

async function deleteListing(id, title){
  if(!confirm(`Deletar permanentemente:\n"${title}"?\n\nEssa ação não pode ser desfeita.`)) return;
  try{
    await api(`/listings/${id}`, {method:'DELETE'});
    toast('Imóvel deletado','i');
    renderListings();
  } catch(e){ toast(e.message,'e'); }
}

/* ═══════════════════════════════════════
   USERS
═══════════════════════════════════════ */
async function renderUsers(){
  const c = document.getElementById('content');
  try{
    const res = await api('/admin/users');
    const users = res.users || [];

    c.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-users"></i>Usuários <span style="color:var(--text3);font-size:12px">${users.length} cadastrados</span></div>
        </div>
        ${users.length===0
          ? '<div class="empty"><i class="ti ti-user-off"></i>Nenhum usuário.</div>'
          : `<table>
          <thead><tr>
            <th>Nome</th><th>E-mail</th><th>Tipo</th>
            <th>CRECI</th><th>Cadastro</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${users.map(u => userRow(u)).join('')}
          </tbody>
        </table>`}
      </div>
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><i class="ti ti-alert-circle"></i>${e.message}</div>`;
  }
}

function userRow(u){
  const typeBadge = u.type==='agency' ? '<span class="badge badge-agency">Imobiliária</span>'
    : u.is_admin ? '<span class="badge badge-admin">Admin</span>'
    : '<span style="font-size:12px;color:var(--text3)">Pessoa</span>';
  const date = u.created_at ? new Date(u.created_at).toLocaleDateString('pt-BR') : '—';
  return `<tr>
    <td class="name">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--vl);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${(u.name||'U').substring(0,1).toUpperCase()}</div>
        <div>
          ${u.name || '—'}
          ${u.is_verified?'<i class="ti ti-rosette-discount-check" style="color:#4ade80;font-size:13px;margin-left:4px"></i>':''}
        </div>
      </div>
    </td>
    <td style="font-size:12px;color:var(--text3)">${u.email}</td>
    <td>${typeBadge} ${u.agency_name?`<span style="font-size:11px;color:var(--text3)">${u.agency_name}</span>`:''}</td>
    <td style="font-size:11px;color:var(--text3)">${u.creci || '—'}</td>
    <td style="font-size:11px;color:var(--text3)">${date}</td>
    <td>
      <div class="actions">
        ${!u.is_verified?`<button class="act verify" onclick="verifyUser('${u.id}')"><i class="ti ti-rosette-discount-check"></i>Verificar</button>`:''}
        ${!u.is_admin?`<button class="act" onclick="makeAdmin('${u.id}','${(u.name||'').replace(/'/g,"\\'")}')"><i class="ti ti-shield"></i>Admin</button>`:''}
      </div>
    </td>
  </tr>`;
}

async function verifyUser(id){
  try{
    await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify({is_verified:true})});
    toast('Usuário verificado ✓','s');
    renderUsers();
  } catch(e){ toast(e.message,'e'); }
}

async function makeAdmin(id, name){
  if(!confirm(`Tornar "${name}" administrador?\nEle terá acesso total ao painel.`)) return;
  try{
    await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify({is_admin:true})});
    toast('Usuário promovido a admin ✓','s');
    renderUsers();
  } catch(e){ toast(e.message,'e'); }
}

/* ═══════════════════════════════════════
   LEADS
═══════════════════════════════════════ */

/* ═══════════════════════════════════════
   RADAR
═══════════════════════════════════════ */
async function renderRadar(){
  const c = document.getElementById('content');
  try{
    const [stats, demand] = await Promise.allSettled([
      api('/admin/stats'),
      api('/radar/demand'),
    ]);

    const s = stats.status === 'fulfilled' ? stats.value : {};
    const d = demand.status === 'fulfilled' ? demand.value : {};

    c.innerHTML = `
      <div class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card">
          <div class="stat-label"><i class="ti ti-radar"></i>Buscas ativas</div>
          <div class="stat-n">${s.radarSearches || 0}</div>
          <div class="stat-sub">compradores/locatários monitorando</div>
        </div>
        ${d.byType ? Object.entries(d.byType).map(([type, count]) =>
          `<div class="stat-card">
            <div class="stat-label"><i class="ti ti-tag"></i>${{residential:'Residencial',rural:'Rural',lot:'Lote',commercial:'Comercial'}[type]||type}</div>
            <div class="stat-n">${count}</div>
            <div class="stat-sub">buscas ativas</div>
          </div>`
        ).join('') : ''}
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-radar"></i>Buscas recentes no Radar</div>
        </div>
        <div id="radarSearchesArea" style="padding:20px">
          <div class="spinner"></div>
        </div>
      </div>
    `;

    // Load searches
    try{
      const searches = await api('/radar/searches?limit=20');
      const items = searches.searches || searches.data || [];
      if(!items.length){
        document.getElementById('radarSearchesArea').innerHTML = '<div class="empty" style="padding:20px 0"><i class="ti ti-radar-off"></i>Nenhuma busca ativa.</div>';
        return;
      }
      document.getElementById('radarSearchesArea').innerHTML = items.map(s => `
        <div class="radar-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="font-weight:600;font-size:13px">${s.name || 'Visitante'}</div>
            <div style="font-size:11px;color:var(--text3)">${s.phone || ''}</div>
          </div>
          <div class="radar-card-row">
            ${s.type?`<span class="radar-tag">${s.type}</span>`:''}
            ${s.purpose?`<span class="radar-tag">${s.purpose==='sale'?'Compra':'Aluguel'}</span>`:''}
            ${s.city?`<span class="radar-tag">${s.city}</span>`:''}
            ${s.max_price?`<span class="radar-tag">Até R$ ${(s.max_price/1000).toFixed(0)}mil</span>`:''}
          </div>
        </div>
      `).join('');
    } catch(e){
      document.getElementById('radarSearchesArea').innerHTML = '<div class="empty" style="padding:20px 0"><i class="ti ti-info-circle"></i>Rota /radar/searches não disponível. Adicione no backend para visualizar buscas.</div>';
    }
  } catch(e){
    c.innerHTML = `<div class="empty"><i class="ti ti-alert-circle"></i>${e.message}</div>`;
  }
}

/* ═══════════════════════════════════════
   STORIES
═══════════════════════════════════════ */
async function renderStories(){
  const c = document.getElementById('content');
  try{
    const res = await api('/stories');
    const stories = res.stories || [];

    c.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title"><i class="ti ti-circle-dashed"></i>Stories publicados <span style="color:var(--text3);font-size:12px">${stories.length} ativos</span></div>
        </div>
        ${stories.length===0
          ? '<div class="empty"><i class="ti ti-video-off"></i>Nenhum story publicado ainda.</div>'
          : `<table>
          <thead><tr>
            <th>Thumb</th><th>Anunciante</th><th>Imóvel vinculado</th>
            <th>Legenda</th><th>Visualizações</th><th>Expira</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${stories.map(s => storyRow(s)).join('')}
          </tbody>
        </table>`}
      </div>
    `;
  } catch(e){
    c.innerHTML = `<div class="empty"><i class="ti ti-alert-circle"></i>${e.message}</div>`;
  }
}

function storyRow(s){
  const adv = s.users || {};
  const listing = s.listings;
  const expires = s.expires_at ? new Date(s.expires_at).toLocaleDateString('pt-BR') : '—';
  return `<tr>
    <td>${s.thumb_url?`<img class="listing-thumb" src="${s.thumb_url}" loading="lazy" style="width:40px;height:64px;border-radius:6px">`:
      '<div class="listing-thumb" style="height:64px;width:40px"></div>'}</td>
    <td class="name">${adv.name || adv.agency_name || '—'}</td>
    <td style="font-size:12px;color:var(--text3)">${listing?.title || '<span style="color:var(--text3)">Sem vínculo</span>'}</td>
    <td style="font-size:12px;color:var(--text3);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.caption || '—'}</td>
    <td>${s.views || 0}</td>
    <td style="font-size:11px;color:var(--text3)">${expires}</td>
    <td>
      <button class="act danger" onclick="deleteStory('${s.id}')"><i class="ti ti-trash"></i>Remover</button>
    </td>
  </tr>`;
}

async function deleteStory(id){
  if(!confirm('Remover este story?')) return;
  try{
    await api(`/stories/${id}`, {method:'DELETE'});
    toast('Story removido','i');
    renderStories();
  } catch(e){ toast(e.message,'e'); }
}
