<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KAZA Imóveis — Barreiras BA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--v:#1E3A2F;--t:#C4622D;--a:#F5EFE6;--tl:#E8845A;--ch:#1A1A1A;--cz:#8A7F77;--fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif}
body{font-family:var(--fb);background:var(--a);color:var(--ch)}
a{color:inherit;text-decoration:none}
nav{background:var(--v);padding:0 2rem;display:flex;align-items:center;height:64px;position:sticky;top:0;z-index:50;gap:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{font-family:var(--fd);font-size:1.6rem;color:#fff;cursor:pointer;display:flex;align-items:baseline;gap:2px}
.dot{color:var(--t)}.sub{font-family:var(--fb);font-size:.6rem;font-weight:300;color:rgba(255,255,255,.55);letter-spacing:.14em;text-transform:uppercase;margin-left:3px;margin-top:2px}
.nav-links{display:flex;gap:4px;margin-left:auto;align-items:center}
.nl{color:rgba(255,255,255,.78);font-size:.82rem;font-weight:500;cursor:pointer;padding:6px 11px;border-radius:6px;transition:all .15s}
.nl:hover{background:rgba(255,255,255,.1);color:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:.55rem 1.25rem;border-radius:8px;font-family:var(--fb);font-size:.875rem;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--t);color:#fff}.btn-p:hover{background:var(--tl)}
.btn-o{background:transparent;color:var(--t);border:1.5px solid var(--t)}.btn-o:hover{background:var(--t);color:#fff}
.btn-d{background:var(--v);color:#fff}.btn-d:hover{opacity:.85}
.btn-w{background:#25D366;color:#fff}
.btn-lg{padding:.8rem 2rem;font-size:.95rem}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge i{font-size:11px}
.b-res{background:var(--v);color:#fff}.b-rur{background:#2d5a20;color:#fff}.b-lot{background:#7c5c1a;color:#fff}.b-com{background:#3a3a6b;color:#fff}
.b-feat{background:var(--t);color:#fff}.b-vnd{background:#e8f5e9;color:#2e7d32}.b-alg{background:#e3f2fd;color:#1565c0}
.b-atv{background:#d1fae5;color:#065f46}.b-pau{background:#f3f4f6;color:#6b7280}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,47,.08);transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(30,58,47,.14)}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#c8d5cf;transition:transform .35s}
.card:hover .card-img{transform:scale(1.03)}
.card-body{padding:1rem}
.card-price{font-size:1.2rem;font-weight:700;color:var(--t);margin-bottom:4px}
.card-title{font-size:.9rem;font-weight:600;color:#111;margin-bottom:6px;line-height:1.4;letter-spacing:-.01em}
.card-loc{font-size:.78rem;color:var(--cz);margin-bottom:10px;display:flex;align-items:center;gap:3px}
.card-loc i{font-size:13px}
.card-feats{display:flex;gap:1rem;padding-top:10px;border-top:1px solid var(--a);font-size:.78rem}
.cf{display:flex;align-items:center;gap:4px;color:#444}
.cf i{font-size:14px;color:var(--cz)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem}
@media(max-width:900px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.g3,.g2{grid-template-columns:1fr}.nav-links .nl:not(:last-child){display:none}}
.sec{padding:3.5rem 2rem}.sec-a{background:var(--a)}.sec-w{background:#fff}.sec-v{background:var(--v)}
.cnt{max-width:1200px;margin:0 auto}
.sh{font-family:var(--fd);font-size:1.9rem;margin-bottom:.4rem}
.ss{color:var(--cz);margin-bottom:1.75rem}
.hero{background:var(--v);padding:5rem 2rem;text-align:center}
.hero h1{font-family:var(--fd);font-size:clamp(1.8rem,4vw,3.2rem);color:#fff;line-height:1.1;margin-bottom:1rem}
.hero p{color:rgba(255,255,255,.7);font-size:1rem;margin-bottom:2.5rem;font-weight:300;max-width:540px;margin-left:auto;margin-right:auto;line-height:1.65}
.sbar{background:#fff;border-radius:12px;padding:.65rem;display:flex;gap:.5rem;max-width:700px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.2);flex-wrap:wrap;align-items:center}
.sbar i{font-size:18px;color:#aaa;margin-left:4px;flex-shrink:0}
.sbar input{flex:1;min-width:140px;border:none;outline:none;font-family:var(--fb);font-size:.9rem;padding:.3rem .5rem}
.sbar select{border:none;outline:none;font-family:var(--fb);font-size:.8rem;background:var(--a);border-radius:7px;padding:.35rem .5rem}
.statbar{background:var(--v);border-top:1px solid rgba(255,255,255,.1);padding:1rem 2rem;display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:10px;padding:.25rem 0}
.stat-ico{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-ico i{font-size:17px;color:var(--tl)}
.stat-txt{display:flex;flex-direction:column}
.stat-n{font-family:var(--fd);font-size:1.1rem;color:#fff;font-weight:700;line-height:1.1}
.stat-l{font-size:.62rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.08em}
.lws{display:grid;grid-template-columns:250px 1fr;gap:1.5rem;align-items:start}
@media(max-width:768px){.lws{grid-template-columns:1fr}}
.sidebar{background:#fff;border-radius:12px;padding:1.25rem;position:sticky;top:72px;box-shadow:0 2px 8px rgba(30,58,47,.06)}
.ft{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--v);margin-bottom:.65rem;margin-top:1rem}
.ft:first-child{margin-top:0}
.pi{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-family:var(--fb);font-size:.8rem;width:100%}
.ck{display:flex;align-items:center;gap:7px;font-size:.84rem;cursor:pointer;padding:3px 0}
.ck input{accent-color:var(--t)}
.dl{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
@media(max-width:860px){.dl{grid-template-columns:1fr}}
.gallery{border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:var(--v)}
.gallery img{width:100%;height:100%;object-fit:cover;display:block}
.thumbs{display:flex;gap:7px;margin-top:7px}
.thumb{width:72px;height:54px;object-fit:cover;border-radius:7px;cursor:pointer;opacity:.65;transition:opacity .15s;border:2px solid transparent}
.thumb.act,.thumb:hover{opacity:1;border-color:var(--t)}
.cc{background:var(--v);border-radius:12px;padding:1.5rem;position:sticky;top:72px}
.cc h3{font-family:var(--fd);font-size:1.2rem;color:#fff;margin-bottom:1rem}
.ci{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:.6rem .9rem;color:#fff;font-family:var(--fb);font-size:.875rem;margin-bottom:.7rem;outline:none;transition:border-color .15s}
.ci::placeholder{color:rgba(255,255,255,.45)}.ci:focus{border-color:var(--tl)}
.dashl{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 64px)}
.dsi{background:var(--v);padding:1.5rem 0}
.dni{display:flex;align-items:center;gap:9px;padding:.7rem 1.4rem;color:rgba(255,255,255,.68);cursor:pointer;font-size:.875rem;font-weight:500;transition:all .15s}
.dni i{font-size:16px}
.dni:hover,.dni.act{background:rgba(255,255,255,.1);color:#fff}
.dni.act{border-left:2px solid var(--t)}
.dc{padding:1.75rem;background:var(--a)}
.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,47,.06);table-layout:fixed}
.tbl th{background:var(--v);color:#fff;padding:.7rem 1rem;text-align:left;font-size:.77rem;font-weight:500;letter-spacing:.04em}
.tbl td{padding:.85rem 1rem;border-bottom:1px solid var(--a);font-size:.85rem;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.stp{display:flex;align-items:center;margin-bottom:2rem;gap:0}
.stn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.stn.act{background:var(--t);color:#fff}.stn.don{background:var(--v);color:#fff}.stn.pen{background:#e0e0e0;color:var(--cz)}
.stl{font-size:.78rem;font-weight:500;margin-left:6px;white-space:nowrap}
.stl.act{color:var(--t)}.stl.pen{color:var(--cz)}
.stline{flex:1;height:2px;background:#e0e0e0;margin:0 6px}.stline.don{background:var(--v)}
.fg{margin-bottom:1.1rem}
.fl{display:block;font-size:.78rem;font-weight:500;margin-bottom:5px}
.fi{width:100%;padding:.6rem .9rem;border:1.5px solid #ddd;border-radius:8px;font-family:var(--fb);font-size:.88rem;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--t)}
.fs{width:100%;padding:.6rem .9rem;border:1.5px solid #ddd;border-radius:8px;font-family:var(--fb);font-size:.88rem;background:#fff;outline:none}
.tcg{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:1.5rem}
.tc{border:2px solid #eee;border-radius:12px;padding:1.25rem;text-align:center;cursor:pointer;transition:all .15s}
.tc:hover{border-color:var(--tl)}.tc.sel{border-color:var(--t);background:rgba(196,98,45,.05)}
.tc-ico{font-size:22px;color:var(--v);margin-bottom:.4rem}
.tc-ico i{font-size:22px}
.tc-l{font-weight:500;font-size:.88rem}.tc-s{font-size:.75rem;color:var(--cz);margin-top:3px}
.ok{background:#e8f5e9;color:#2e7d32;padding:.875rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.88rem;display:flex;align-items:center;gap:7px}
.ok i{font-size:16px}
.infocrd{background:#fff;border-radius:12px;padding:1.5rem;margin-top:1rem}
.divider{border:none;border-top:1px solid var(--a);margin:1.25rem 0}
.feat-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.875rem}
.feat-box{text-align:center;padding:.875rem;background:var(--a);border-radius:9px}
.feat-box i{font-size:18px;color:var(--v);display:block;margin-bottom:4px}



/* ── Create Story Modal ── */
.cs-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cs-modal{background:#fff;border-radius:20px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.cs-header{background:linear-gradient(135deg,#1E3A2F,#2a4d3f);padding:1.5rem;display:flex;align-items:center;gap:12px}
.cs-header-icon{width:44px;height:44px;border-radius:12px;background:rgba(196,98,45,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cs-header-icon i{font-size:22px;color:#E8845A}
.cs-header-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:#fff}
.cs-header-sub{font-size:.75rem;color:rgba(255,255,255,.55);margin-top:2px}
.cs-close{margin-left:auto;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.cs-close:hover{background:rgba(255,255,255,.2);color:#fff}
.cs-body{padding:1.5rem}
.cs-step{display:none}.cs-step.active{display:block}
.cs-label{font-size:.75rem;font-weight:600;color:#2d2d2d;letter-spacing:.02em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.cs-label i{font-size:14px;color:#C4622D}
.cs-input{width:100%;padding:.75rem 1rem;border:1.5px solid #EDE4D4;border-radius:10px;font-family:var(--fb,sans-serif);font-size:.88rem;color:#111;outline:none;transition:border-color .2s;background:#fff}
.cs-input:focus{border-color:#1E3A2F;box-shadow:0 0 0 3px rgba(30,58,47,.08)}
.cs-input::placeholder{color:#b3a89f}
.cs-video-preview{margin-top:10px;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:16/9;display:none;align-items:center;justify-content:center;position:relative}
.cs-video-preview iframe{width:100%;height:100%;border:none}
.cs-video-preview.show{display:flex}
.cs-tip{background:#F5EFE6;border-radius:9px;padding:.75rem 1rem;font-size:.78rem;color:#8A7F77;display:flex;gap:8px;align-items:flex-start;line-height:1.55;margin-top:8px}
.cs-tip i{flex-shrink:0;font-size:14px;color:#C4622D;margin-top:1px}
.cs-property-grid{display:flex;flex-direction:column;gap:.5rem;max-height:220px;overflow-y:auto;margin-top:4px}
.cs-prop{border:1.5px solid #EDE4D4;border-radius:10px;padding:.75rem;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.cs-prop:hover{border-color:#C4622D;background:rgba(196,98,45,.04)}
.cs-prop.sel{border-color:#1E3A2F;background:rgba(30,58,47,.06)}
.cs-prop-img{width:48px;height:38px;border-radius:6px;object-fit:cover;background:#EDE4D4;flex-shrink:0}
.cs-prop-name{font-size:.84rem;font-weight:500;color:#111;line-height:1.3}
.cs-prop-meta{font-size:.72rem;color:#8A7F77;margin-top:1px}
.cs-prop-check{margin-left:auto;width:20px;height:20px;border-radius:50%;border:2px solid #EDE4D4;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cs-prop.sel .cs-prop-check{background:#1E3A2F;border-color:#1E3A2F;color:#fff}
.cs-steps-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:1.25rem}
.cs-dot{width:6px;height:6px;border-radius:50%;background:#EDE4D4;transition:all .25s}
.cs-dot.on{background:#1E3A2F;width:20px;border-radius:99px}
.cs-footer{padding:1rem 1.5rem;border-top:1px solid #F5EFE6;display:flex;justify-content:space-between;align-items:center}
.cs-btn{display:inline-flex;align-items:center;gap:6px;padding:.625rem 1.25rem;border-radius:9px;font-family:var(--fb,sans-serif);font-size:.84rem;font-weight:500;cursor:pointer;border:none;transition:all .18s}
.cs-btn-p{background:#1E3A2F;color:#fff}.cs-btn-p:hover{background:#2a4d3f}
.cs-btn-t{background:#C4622D;color:#fff}.cs-btn-t:hover{background:#E8845A}
.cs-btn-o{background:#fff;color:#8A7F77;border:1.5px solid #EDE4D4}.cs-btn-o:hover{border-color:#1E3A2F;color:#1E3A2F}
.cs-success{text-align:center;padding:1.5rem 1rem}
.cs-success-ring{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#1E3A2F,#2a4d3f);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(30,58,47,.3)}
.cs-success-ring i{font-size:30px;color:#4ade80}

.stories-wrap{padding:16px 28px 0;max-width:1240px;margin:0 auto}
.stories-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--cz);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stories-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#C4622D,#E8845A);transition:transform .2s}
.story-ring.seen{background:#ddd}
.story-ring:hover{transform:scale(1.05)}
.story-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;border:2.5px solid #fff}
.story-inner img{width:100%;height:100%;object-fit:cover}
.story-name{font-size:.65rem;color:var(--cm);max-width:64px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:500}
.story-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.story-modal{background:#000;border-radius:16px;overflow:hidden;width:340px;position:relative;cursor:default}
.story-modal img{width:100%;display:block;max-height:450px;object-fit:cover}
.story-modal-info{background:#111;padding:14px 16px;display:flex;align-items:center;gap:10px}
.story-modal-av{width:36px;height:36px;border-radius:50%;background:var(--v);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fd);font-size:.9rem;font-weight:700;flex-shrink:0}
.story-modal-title{font-size:.88rem;font-weight:500;color:#fff}
.story-modal-meta{font-size:.75rem;color:rgba(255,255,255,.5)}
.story-modal-btn{margin-left:auto;background:var(--t);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:.78rem;cursor:pointer;font-family:var(--fb);display:flex;align-items:center;gap:5px}
.story-close{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.b-deal{background:#f97316;color:#fff}
.b-fair{background:#059669;color:#fff}
.b-swap{background:rgba(255,255,255,.9);color:#1E3A2F;border:1px solid rgba(30,58,47,.25)}
footer{background:var(--ch);color:rgba(255,255,255,.55);padding:3.5rem 2rem 2rem;font-size:.83rem}
.footer-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1.2fr;gap:2.5rem;max-width:1240px;margin:0 auto 2.5rem}
.footer-brand .logo-f{font-family:var(--fd);font-size:1.6rem;color:#fff;margin-bottom:.5rem}
.footer-brand p{font-size:.83rem;line-height:1.65;color:rgba(255,255,255,.45);max-width:220px;margin-bottom:1.1rem}
.footer-socials{display:flex;gap:.625rem}
.footer-social{width:36px;height:36px;border-radius:9px;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);transition:all .2s;text-decoration:none}
.footer-social:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.25)}
.footer-social i{font-size:16px}
.footer-col-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--tl);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.footer-col-title::before,.footer-col-title::after{content:'';display:inline-block;width:18px;height:1px;background:var(--tl)}
.footer-links{display:flex;flex-direction:column;gap:.65rem}
.footer-links a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.85rem;transition:color .15s}
.footer-links a:hover{color:#fff}
.footer-contact{display:flex;flex-direction:column;gap:.75rem}
.footer-contact-item{display:flex;gap:9px;align-items:flex-start;font-size:.83rem;color:rgba(255,255,255,.5)}
.footer-contact-item i{font-size:15px;color:var(--tl);flex-shrink:0;margin-top:2px}
.footer-contact-item a{color:rgba(255,255,255,.5);text-decoration:none;transition:color .15s}
.footer-contact-item a:hover{color:#fff}
.footer-bottom{max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;padding-top:1.75rem;font-size:.75rem;color:rgba(255,255,255,.3);border-top:1px solid rgba(255,255,255,.08)}
.footer-bottom a{color:rgba(255,255,255,.3);text-decoration:none;transition:color .15s}
.footer-bottom a:hover{color:rgba(255,255,255,.6)}
@media(max-width:900px){.footer-grid{grid-template-columns:1fr 1fr!important;gap:2rem!important}}
@media(max-width:560px){.footer-grid{grid-template-columns:1fr!important}footer{padding:2.5rem 1.5rem 1.5rem!important}}
/* ── RADAR ── */
.rdr-hero{background:var(--v);padding:3.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.rdr-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:300px;height:300px;border-radius:50%;background:rgba(196,98,45,.06);pointer-events:none}
.rdr-tag{display:inline-flex;align-items:center;gap:6px;background:var(--t);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 13px;border-radius:99px;margin-bottom:18px}
.rdr-tag i{font-size:12px}
.rdr-h1{font-family:var(--fd);font-size:clamp(1.8rem,4vw,2.8rem);color:#fff;line-height:1.1;margin-bottom:.875rem}
.rdr-h1 em{color:var(--tl);font-style:normal}
.rdr-sub{color:rgba(255,255,255,.6);font-size:.9rem;max-width:480px;margin:0 auto 2.5rem;line-height:1.7;font-weight:300}
.rdr-demand{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem}
.rdr-dm{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.6rem 1rem;display:flex;align-items:center;gap:7px}
.rdr-dm-n{font-family:var(--fd);font-size:1.3rem;color:var(--tl);min-width:28px}
.rdr-dm-l{font-size:.72rem;color:rgba(255,255,255,.55);line-height:1.3}
.rdr-dm-l strong{color:rgba(255,255,255,.85);display:block}
.rdr-cta{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:680px;margin:0 auto}
.rdr-opt{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:14px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s}
.rdr-opt:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
.rdr-opt-ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px}
.rdr-opt-ico i{font-size:22px}
.rdr-opt-t{font-family:var(--fd);font-size:1rem;color:#fff;margin-bottom:4px}
.rdr-opt-s{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.45}
.rdr-ind-btn{display:inline-flex;align-items:center;gap:7px;margin-top:2rem;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.65);font-size:.8rem;font-weight:500;padding:.5rem 1.1rem;border-radius:8px;cursor:pointer;transition:all .15s;font-family:var(--fb)}
.rdr-ind-btn:hover{background:rgba(255,255,255,.08);color:#fff}
/* quero/posso forms */
.rdr-wrap{background:var(--a);padding:2rem;min-height:calc(100vh - 64px)}
.rdr-form{background:#fff;border-radius:14px;padding:2rem;max-width:620px;margin:0 auto}
.rdr-form-title{font-family:var(--fd);font-size:1.3rem;margin-bottom:.4rem}
.rdr-form-sub{color:var(--cz);font-size:.82rem;margin-bottom:1.5rem;line-height:1.55}
.rdr-seg{display:flex;background:var(--a);border-radius:9px;padding:3px;gap:3px;margin-bottom:1.25rem}
.rdr-seg-btn{flex:1;padding:.6rem;border-radius:7px;border:none;font-family:var(--fb);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--cz);background:transparent}
.rdr-seg-btn.on{background:#fff;color:var(--ch);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.rdr-types{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.rdr-type{border:1.5px solid #eee;border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:all .15s}
.rdr-type:hover{border-color:var(--tl)}.rdr-type.sel{border-color:var(--t);background:rgba(196,98,45,.05)}
.rdr-type-ico{font-size:20px;color:var(--v);margin-bottom:5px}
.rdr-type-ico i{font-size:20px}
.rdr-type-l{font-size:.82rem;font-weight:500}.rdr-type-s{font-size:.7rem;color:var(--cz);margin-top:2px}
/* índice */
.ind-tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.ind-tab{padding:.5rem 1rem;border-radius:8px;border:1.5px solid #eee;background:transparent;font-family:var(--fb);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--cz);display:inline-flex;align-items:center;gap:5px}
.ind-tab.on{background:var(--v);color:#fff;border-color:var(--v)}
.ind-tab i{font-size:14px}
.ind-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.ind-card{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid rgba(0,0,0,.07)}
.ind-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ind-area{font-size:.88rem;font-weight:600;color:var(--ch)}
.ind-trend{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:99px}
.ind-up{background:#e8f5e9;color:#2e7d32}.ind-eq{background:#f3f4f6;color:#666}
.ind-price{font-size:1.3rem;font-weight:700;color:var(--t);margin-bottom:2px}
.ind-label{font-size:.72rem;color:var(--cz);margin-bottom:10px}
.ind-bar-wrap{background:var(--a);border-radius:99px;height:5px;overflow:hidden;margin-bottom:5px}
.ind-bar-fill{height:100%;border-radius:99px}
.ind-bar-meta{display:flex;justify-content:space-between;font-size:.67rem;color:var(--cz)}
.ind-sem{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;margin-top:8px;padding:3px 8px;border-radius:99px}
.ind-abaixo{background:#e8f5e9;color:#2e7d32}.ind-medio{background:#fff3e0;color:#e65100}.ind-acima{background:#ffebee;color:#c62828}
/* sucesso */
.rdr-success{text-align:center;padding:2rem 1rem}
.rdr-success i{font-size:3rem;color:var(--v);display:block;margin-bottom:1rem}
.rdr-success-t{font-family:var(--fd);font-size:1.4rem;margin-bottom:.5rem}
.rdr-success-s{color:var(--cz);font-size:.85rem;line-height:1.65;max-width:340px;margin:0 auto 1.5rem}
.rdr-notif-box{background:var(--v);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.rdr-notif-box i{font-size:18px;color:var(--tl);flex-shrink:0}
.rdr-notif-txt{font-size:.8rem;color:rgba(255,255,255,.8);line-height:1.5}
.rdr-notif-txt strong{color:#fff}
@media(max-width:580px){.rdr-cta{grid-template-columns:1fr}.rdr-demand{gap:.6rem}}
</style>

const TL={residential:'Residencial',rural:'Rural',lot:'Lote',commercial:'Comercial'};
const TC={residential:'b-res',rural:'b-rur',lot:'b-lot',commercial:'b-com'};
const TI={residential:'ti-home',rural:'ti-tractor',lot:'ti-layout-board',commercial:'ti-building'};

function fmt(n,rent){
  if(rent)return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0})+'/mês';
  if(n>=1000000)return'R$ '+(n/1000000).toFixed(1).replace('.',',')+' mi';
  if(n>=1000)return'R$ '+(n/1000).toFixed(0)+'mil';
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
}
function btag(t){return`<span class="badge ${TC[t]}"><i class="ti ${TI[t]}" aria-hidden="true"></i>${TL[t]}</span>`}
function ptag(p){return p==='sale'?'<span class="badge b-vnd">Venda</span>':'<span class="badge b-alg">Aluguel</span>'}

function calcScore(l){let s=5;if(l.price){let r=null;const B={residential_m2:3200,commercial_m2:2800,lot_m2:850,rural_ha:19400};if(l.type==='rural'&&l.area_ha)r={val:l.price/l.area_ha,b:B.rural_ha};else if(l.area&&l.type==='residential')r={val:l.price/l.area,b:B.residential_m2};else if(l.area&&l.type==='commercial')r={val:l.price/l.area,b:B.commercial_m2};else if(l.area&&l.type==='lot')r={val:l.price/l.area,b:B.lot_m2};if(r){const ratio=r.val/r.b;if(ratio<0.80)s+=2.5;else if(ratio<0.92)s+=1.5;else if(ratio<1.05)s+=0.5;else if(ratio>1.25)s-=1.5;else if(ratio>1.10)s-=0.5;}}const np=(l.imgs||[]).length||1;if(np>=7)s+=1.2;else if(np>=4)s+=0.7;else if(np<=1)s-=1;const dl=(l.desc||'').length;if(dl>300)s+=0.8;else if(dl>100)s+=0.4;else s-=0.5;const score=Math.min(10,Math.max(1,Math.round(s*10)/10));let label=null;if(score>=8.0)label={text:'Oportunidade',cls:'b-deal',icon:'ti-bolt'};else if(score>=6.5)label={text:'Preço Justo',cls:'b-fair',icon:'ti-check'};return{score,label};}

function cardH(l){
  const price=fmt(l.price,l.purpose==='rent');
  const {label}=calcScore(l);
  const feats=l.beds
    ?`<span class="cf"><i class="ti ti-bed" aria-hidden="true"></i>${l.beds}</span><span class="cf"><i class="ti ti-bath" aria-hidden="true"></i>${l.baths}</span><span class="cf"><i class="ti ti-car" aria-hidden="true"></i>${l.park}</span>`
    :l.area_ha?`<span class="cf"><i class="ti ti-map" aria-hidden="true"></i>${l.area_ha}ha</span>`
    :`<span class="cf"><i class="ti ti-ruler-measure" aria-hidden="true"></i>${l.area}m²</span>`;
  const topR=[l.featured?`<span class="badge b-feat"><i class="ti ti-star" aria-hidden="true"></i>Destaque</span>`:'',label?`<span class="badge ${label.cls}"><i class="ti ${label.icon}" aria-hidden="true"></i>${label.text}</span>`:''].filter(Boolean);
  return`<div class="card" onclick="go('detail',${l.id})">
    <div class="card-imgwrap">
      <img class="card-img" src="${l.img}" loading="lazy" onerror="this.style.background='#c8d5cf'">
      <div style="position:absolute;top:12px;left:12px;z-index:2">${btag(l.type)}</div>
      ${topR.length?`<div style="position:absolute;top:12px;right:12px;z-index:2;display:flex;flex-direction:column;gap:4px;align-items:flex-end">${topR.join('')}</div>`:''}
    </div>
    <div class="card-body">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
        <div class="card-price">${price}</div>${ptag(l.purpose)}
      </div>
      <div class="card-title">${l.title}</div>
      <div class="card-loc"><i class="ti ti-map-pin" aria-hidden="true"></i>${l.neigh} · ${l.city}</div>
      <div class="card-feats">${feats}${l.swap?`<span class="badge b-swap" style="font-size:.62rem;padding:2px 6px"><i class="ti ti-arrows-exchange" aria-hidden="true"></i>Permuta</span>`:''}<span style="flex:1"></span><span class="cf" style="color:var(--cz)"><i class="ti ti-eye" aria-hidden="true"></i>${l.views}</span></div>
    </div>
  </div>`;
}

function showToast(msg, type) {
  let t = document.getElementById('kz-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'kz-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:.75rem 1.4rem;border-radius:10px;font-family:var(--fb);font-size:.88rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(t);
  }
  t.style.background = type === 'err' ? '#c62828' : '#1A1A1A';
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._h);
  t._h = setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2800);
}

function openStory(sid){
  const s=STORIES.find(x=>x.id===sid);if(!s)return;
  s.seen=true;
  const r=document.querySelector('[data-story="'+sid+'"] .story-ring');
  if(r)r.classList.add('seen');
  const bg=document.createElement('div');
  bg.className='story-modal-bg';
  bg.onclick=()=>bg.remove();
  const videoSrc = s.nativeVideoUrl || s.localVideoUrl || null;
  const media = videoSrc
    ? `<div style="background:#000;max-height:460px;overflow:hidden">
        <video src="${videoSrc}" controls autoplay muted playsinline
          style="width:100%;max-height:460px;display:block;object-fit:contain"
          onended="this.currentTime=0"></video>
       </div>`
    : s.videoEmbed
    ? `<div style="position:relative;aspect-ratio:9/16;max-height:450px;background:#000"><iframe src="${s.videoEmbed}" allowfullscreen style="width:100%;height:100%;border:none"></iframe></div>`
    : `<img src="${s.img}" alt="${s.name}" style="width:100%;display:block;max-height:450px;object-fit:cover">`;
  bg.innerHTML=`<div class="story-modal" onclick="event.stopPropagation()">
    <button class="story-close" onclick="this.closest('.story-modal-bg').remove()"><i class="ti ti-x"></i></button>
    ${media}
    <div class="story-modal-info">
      <div class="story-modal-av">${s.name[0]}</div>
      <div>
        <div class="story-modal-title">${s.name}</div>
        ${s.isOwn?'<div style="font-size:.65rem;color:rgba(255,255,255,.4);margin-top:1px">Seu story</div>':''}
      </div>
      <button class="story-modal-btn" onclick="document.querySelector('.story-modal-bg').remove();go('detail','${s.lid}')">
        <i class="ti ti-arrow-right"></i>Ver imóvel
      </button>
    </div>
  </div>`;
  document.body.appendChild(bg);
}

let CS = { step: 1, videoUrl: '', videoEmbed: '', listingId: null, listings: [] };

async function openCreateStory() {
  CS = { step: 1, videoUrl: '', videoEmbed: '', listingId: null, listings: [] };

  // Buscar imóveis do usuário logado
  try {
    const data = await apiFetch('/me/listings');
    CS.listings = (data?.listings || []).filter(l => l.status === 'active');
  } catch(e) { CS.listings = []; }

  renderCreateStory();
}

            <span>Grave pelo celular mesmo! Mostre a fachada, os cômodos principais e o diferencial do imóvel. <strong>Vídeos de 30–60 segundos</strong> são os que mais convertem.</span>
          </div>
        </div>

        <!-- PASSO 2: Imóvel -->
        <div class="cs-step ${CS.step===2?'active':''}">
          <div class="cs-label"><i class="ti ti-home" aria-hidden="true"></i>Qual imóvel esse vídeo mostra?</div>
          ${CS.listings.length === 0
            ? `<div style="text-align:center;padding:1.5rem;background:#F5EFE6;border-radius:10px">
                <i class="ti ti-home-off" style="font-size:2rem;color:#EDE4D4;display:block;margin-bottom:.5rem" aria-hidden="true"></i>
                <div style="font-size:.84rem;font-weight:500;color:#111;margin-bottom:4px">Nenhum imóvel ativo</div>
                <div style="font-size:.78rem;color:#8A7F77">Você precisa ter um anúncio ativo para criar um Story.</div>
              </div>`
            : `<div class="cs-property-grid">
                ${CS.listings.slice(0,8).map(l => {
                  const photo = (l.listing_photos||[])[0];
                  const img = photo?.url || 'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=200&q=70';
                  const typeLabel = {residential:'Residencial',rural:'Rural',lot:'Lote',commercial:'Comercial'};
                  const price = fmtPrice(l.price, l.purpose==='rent');
                  return `<div class="cs-prop ${CS.listingId===l.id?'sel':''}" onclick="csSelectListing('${l.id}')">
                    <img class="cs-prop-img" src="${img}" alt="${l.title}" onerror="this.style.background='#EDE4D4'">
                    <div style="flex:1;min-width:0">
                      <div class="cs-prop-name">${l.title}</div>
                      <div class="cs-prop-meta">${l.city||''} · ${price}</div>
                    </div>
                    <div class="cs-prop-check">
                      ${CS.listingId===l.id?'<i class="ti ti-check" style="font-size:11px" aria-hidden="true"></i>':''}
                    </div>
                  </div>`;
                }).join('')}
              </div>`}
        </div>

        <!-- PASSO 3: Confirmar -->
        <div class="cs-step ${CS.step===3?'active':''}">
          ${CS.step===3 ? `
          <div style="background:#F5EFE6;border-radius:12px;padding:1.1rem;display:flex;gap:12px;align-items:flex-start;margin-bottom:1rem">
            <div style="width:36px;height:36px;border-radius:50%;background:#1E3A2F;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <i class="ti ti-check" style="color:#4ade80;font-size:16px" aria-hidden="true"></i>
            </div>
            <div>
              <div style="font-size:.88rem;font-weight:600;color:#111;margin-bottom:2px">Tudo pronto!</div>
              <div style="font-size:.78rem;color:#8A7F77;line-height:1.5">Seu story vai aparecer na tira de stories da home e destacar seu imóvel para quem está buscando.</div>
            </div>
          </div>
          <div style="background:#fff;border:1.5px solid #EDE4D4;border-radius:12px;padding:1rem">
            <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8A7F77;margin-bottom:.625rem">Resumo do story</div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">
              <i class="ti ti-link" style="color:#C4622D;font-size:14px" aria-hidden="true"></i>
              <span style="font-size:.82rem;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${CS.videoUrl.substring(0,50)}${CS.videoUrl.length>50?'...':''}</span>
            </div>
            ${CS.listingId ? `<div style="display:flex;align-items:center;gap:8px">
              <i class="ti ti-home" style="color:#1E3A2F;font-size:14px" aria-hidden="true"></i>
              <span style="font-size:.82rem;color:#111">${CS.listings.find(l=>l.id===CS.listingId)?.title||''}</span>
            </div>` : ''}
          </div>` : ''}
        </div>

      </div>

      <div class="cs-footer">
        ${CS.step > 1
          ? `<button class="cs-btn cs-btn-o" onclick="csStep(${CS.step-1})"><i class="ti ti-arrow-left" aria-hidden="true"></i>Voltar</button>`
          : `<button class="cs-btn cs-btn-o" onclick="document.getElementById('cs-modal-bg').remove()">Cancelar</button>`}
        ${CS.step < 3
          ? `<button class="cs-btn cs-btn-p" onclick="csNext()">
              Próximo <i class="ti ti-arrow-right" aria-hidden="true"></i>
            </button>`
          : `<button class="cs-btn cs-btn-t" onclick="csPublish()">
              <i class="ti ti-rocket" aria-hidden="true"></i>Publicar story!
            </button>`}
      </div>
    </div>`;

  document.body.appendChild(bg);
}

function csStep(n) { CS.step = n; renderCreateStory(); }

function csHandleFileSelect(files) {
  if (!files || !files[0]) return;
  csLoadFile(files[0]);
}

function csHandleFileDrop(files) {
  if (!files || !files[0]) return;
  if (!files[0].type.startsWith('video/')) return showToast('Selecione um arquivo de vídeo');
  csLoadFile(files[0]);
}

function csLoadFile(file) {
  if (!file.type.startsWith('video/')) return showToast('Selecione um arquivo de vídeo (MP4, MOV ou WebM)');
  if (file.size > 100 * 1024 * 1024) return showToast('Vídeo muito grande. Máximo 100MB.');
  CS.videoFile = file;
  CS.localVideoUrl = URL.createObjectURL(file);
  renderCreateStory();
  // Verificar duração após render
  setTimeout(() => {
    const v = document.getElementById('cs-video-el');
    if (v) v.onloadedmetadata = () => {
      if (v.duration > 65) {
        showToast('Vídeo com mais de 1 minuto. O Cloudinary vai cortar automaticamente nos 60 segundos.');
      }
    };
  }, 200);
}

function csClearVideo() {
  if (CS.localVideoUrl) URL.revokeObjectURL(CS.localVideoUrl);
  CS.videoFile = null;
  CS.localVideoUrl = null;
  renderCreateStory();
}

function csNext() {
  if (CS.step === 1) {
    if (!CS.videoFile) return showToast('Selecione um vídeo para continuar');
  }
  if (CS.step === 2 && !CS.listingId && CS.listings.length > 0) {
    return showToast('Selecione o imóvel que o vídeo mostra');
  }
  csStep(CS.step + 1);
}

function csSelectListing(id) {
  CS.listingId = id;
  renderCreateStory();
}

async function csPublish() {
  if (!CS.videoFile) return showToast('Nenhum vídeo selecionado');
  const listing = CS.listings.find(l => l.id === CS.listingId);

  // Mostrar loading
  const btn = document.querySelector('.cs-btn-t');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i>Enviando vídeo...'; }

  try {
    // Upload para o backend/Cloudinary
    const formData = new FormData();
    formData.append('video', CS.videoFile);
    if (CS.listingId) formData.append('listing_id', CS.listingId);

    const token = localStorage.getItem('kaza_token');
    const res = await fetch(API_BASE + '/stories', {
      method: 'POST',
      headers: token ? { 'Authorization': 'Bearer ' + token } : {},
      body: formData,
    });

    let videoUrl, thumbUrl;
    if (res.ok) {
      const data = await res.json();
      videoUrl = data.video_url;
      thumbUrl = data.thumb_url || listing?.listing_photos?.[0]?.url;
    } else {
      // Fallback: usar URL local temporária (só para esta sessão)
      videoUrl = CS.localVideoUrl;
      thumbUrl = listing?.listing_photos?.[0]?.url ||
        'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=200&q=70';
    }

    const newStory = {
      id: 's' + Date.now(),
      lid: CS.listingId || '',
      name: listing?.title?.substring(0, 18) || 'Meu vídeo',
      seen: false,
      img: thumbUrl || 'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=200&q=70',
      nativeVideoUrl: videoUrl,
      localVideoUrl: CS.localVideoUrl,
      isOwn: true,
    };
    STORIES.unshift(newStory);

    document.getElementById('cs-modal-bg').remove();
    showToast('🎉 Story publicado com sucesso!');
    render();

  } catch(err) {
    // Fallback sem backend
    const newStory = {
      id: 's' + Date.now(),
      lid: CS.listingId || '',
      name: listing?.title?.substring(0, 18) || 'Meu vídeo',
      seen: false,
      img: listing?.listing_photos?.[0]?.url || 'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=200&q=70',
      localVideoUrl: CS.localVideoUrl,
      isOwn: true,
    };
    STORIES.unshift(newStory);
    document.getElementById('cs-modal-bg').remove();
    showToast('Story adicionado! (vídeo local nesta sessão)');
    render();
  }
}

// ── Auth functions ────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email')?.value?.trim();
  const pass  = document.getElementById('login-pass')?.value;
  if (!email || !pass) return showToast('Preencha e-mail e senha');
  const btn = document.querySelector('#app button');
  try {
    const data = await apiFetch('/auth/login', 'POST', {email, password: pass});
    if (!data) return showToast('E-mail ou senha incorretos');
    S.token = data.token; S.user = data.user; S.auth = true;
    localStorage.setItem('kaza_token', S.token);
    localStorage.setItem('kaza_user', JSON.stringify(S.user));
    go('dashboard');
  } catch(err) { showToast('E-mail ou senha incorretos'); }
}

async function doRegister() {
  const name  = document.getElementById('reg-name')?.value?.trim();
  const email = document.getElementById('reg-email')?.value?.trim();
  const phone = document.getElementById('reg-phone')?.value?.trim();
  const pass  = document.getElementById('reg-pass')?.value;
  if (!name || !email || !phone || !pass)
    return showToast('Preencha todos os campos obrigatórios');
  if (pass.length < 8) return showToast('Senha deve ter no mínimo 8 caracteres');
  try {
    const data = await apiFetch('/auth/register', 'POST', {
      name, email, phone, password: pass,
      type: S.rt || 'person',
      agency_name: document.getElementById('reg-agency')?.value || undefined,
      creci: document.getElementById('reg-creci')?.value || undefined,
    });
    if (!data) return showToast('Erro ao criar conta. Tente novamente.');
    S.token = data.token; S.user = data.user; S.auth = true;
    localStorage.setItem('kaza_token', S.token);
    localStorage.setItem('kaza_user', JSON.stringify(S.user));
    showToast('Conta criada com sucesso!');
    go('dashboard');
  } catch(err) { showToast(err.message || 'Erro ao criar conta'); }
}

async function doLogout() {
  S.token = null; S.user = null; S.auth = false; S.cache = {};
  localStorage.removeItem('kaza_token');
  localStorage.removeItem('kaza_user');
  // Restaurar sessão salva
try {
  const savedToken = localStorage.getItem('kaza_token');
  const savedUser  = localStorage.getItem('kaza_user');
  if (savedToken && savedUser) {
    S.token = savedToken;
    S.user  = JSON.parse(savedUser);
    S.auth  = true;
  }
} catch(e) {}

go('home');
}

// Helper apiFetch com suporte a POST
async function apiFetch(path, method='GET', body) {
  try {
    const headers = {'Content-Type':'application/json'};
    const token = S.token || localStorage.getItem('kaza_token');
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API_BASE + path, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro na requisição');
    return data;
  } catch(e) { throw e; }
}
