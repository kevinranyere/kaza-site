<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KAZA Imóveis — Barreiras BA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--v:#1E3A2F;--t:#C4622D;--a:#F5EFE6;--tl:#E8845A;--ch:#1A1A1A;--cz:#8A7F77;--fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',system-ui,sans-serif}
body{font-family:var(--fb);background:var(--a);color:var(--ch)}
a{color:inherit;text-decoration:none}
nav{background:var(--v);padding:0 2rem;display:flex;align-items:center;height:64px;position:sticky;top:0;z-index:50;gap:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.logo{font-family:var(--fd);font-size:1.6rem;color:#fff;cursor:pointer;display:flex;align-items:baseline;gap:2px}
.dot{color:var(--t)}.sub{font-family:var(--fb);font-size:.6rem;font-weight:300;color:rgba(255,255,255,.55);letter-spacing:.14em;text-transform:uppercase;margin-left:3px;margin-top:2px}
.nav-links{display:flex;gap:4px;margin-left:auto;align-items:center}
.nl{color:rgba(255,255,255,.78);font-size:.82rem;font-weight:500;cursor:pointer;padding:6px 11px;border-radius:6px;transition:all .15s}
.nl:hover{background:rgba(255,255,255,.1);color:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:.55rem 1.25rem;border-radius:8px;font-family:var(--fb);font-size:.875rem;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--t);color:#fff}.btn-p:hover{background:var(--tl)}
.btn-o{background:transparent;color:var(--t);border:1.5px solid var(--t)}.btn-o:hover{background:var(--t);color:#fff}
.btn-d{background:var(--v);color:#fff}.btn-d:hover{opacity:.85}
.btn-w{background:#25D366;color:#fff}
.btn-lg{padding:.8rem 2rem;font-size:.95rem}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge i{font-size:11px}
.b-res{background:var(--v);color:#fff}.b-rur{background:#2d5a20;color:#fff}.b-lot{background:#7c5c1a;color:#fff}.b-com{background:#3a3a6b;color:#fff}
.b-feat{background:var(--t);color:#fff}.b-vnd{background:#e8f5e9;color:#2e7d32}.b-alg{background:#e3f2fd;color:#1565c0}
.b-atv{background:#d1fae5;color:#065f46}.b-pau{background:#f3f4f6;color:#6b7280}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,47,.08);transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(30,58,47,.14)}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#c8d5cf;transition:transform .35s}
.card:hover .card-img{transform:scale(1.03)}
.card-body{padding:1rem}
.card-price{font-size:1.2rem;font-weight:700;color:var(--t);margin-bottom:4px}
.card-title{font-size:.9rem;font-weight:600;color:#111;margin-bottom:6px;line-height:1.4;letter-spacing:-.01em}
.card-loc{font-size:.78rem;color:var(--cz);margin-bottom:10px;display:flex;align-items:center;gap:3px}
.card-loc i{font-size:13px}
.card-feats{display:flex;gap:1rem;padding-top:10px;border-top:1px solid var(--a);font-size:.78rem}
.cf{display:flex;align-items:center;gap:4px;color:#444}
.cf i{font-size:14px;color:var(--cz)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem}
@media(max-width:900px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.g3,.g2{grid-template-columns:1fr}.nav-links .nl:not(:last-child){display:none}}
.sec{padding:3.5rem 2rem}.sec-a{background:var(--a)}.sec-w{background:#fff}.sec-v{background:var(--v)}
.cnt{max-width:1200px;margin:0 auto}
.sh{font-family:var(--fd);font-size:1.9rem;margin-bottom:.4rem}
.ss{color:var(--cz);margin-bottom:1.75rem}
.hero{background:var(--v);padding:5rem 2rem;text-align:center}
.hero h1{font-family:var(--fd);font-size:clamp(1.8rem,4vw,3.2rem);color:#fff;line-height:1.1;margin-bottom:1rem}
.hero p{color:rgba(255,255,255,.7);font-size:1rem;margin-bottom:2.5rem;font-weight:300;max-width:540px;margin-left:auto;margin-right:auto;line-height:1.65}
.sbar{background:#fff;border-radius:12px;padding:.65rem;display:flex;gap:.5rem;max-width:700px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,.2);flex-wrap:wrap;align-items:center}
.sbar i{font-size:18px;color:#aaa;margin-left:4px;flex-shrink:0}
.sbar input{flex:1;min-width:140px;border:none;outline:none;font-family:var(--fb);font-size:.9rem;padding:.3rem .5rem}
.sbar select{border:none;outline:none;font-family:var(--fb);font-size:.8rem;background:var(--a);border-radius:7px;padding:.35rem .5rem}
.statbar{background:var(--v);border-top:1px solid rgba(255,255,255,.08);padding:.875rem 2rem;display:flex;justify-content:center;gap:3rem;flex-wrap:wrap}
.stat{text-align:center;display:flex;align-items:center;gap:10px}.stat-n{font-family:var(--fd);font-size:1.2rem;color:#fff;font-weight:700}.stat-l{font-size:.68rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.07em;text-align:left}
.lws{display:grid;grid-template-columns:250px 1fr;gap:1.5rem;align-items:start}
@media(max-width:768px){.lws{grid-template-columns:1fr}}
.sidebar{background:#fff;border-radius:12px;padding:1.25rem;position:sticky;top:72px;box-shadow:0 2px 8px rgba(30,58,47,.06)}
.ft{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--v);margin-bottom:.65rem;margin-top:1rem}
.ft:first-child{margin-top:0}
.pi{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-family:var(--fb);font-size:.8rem;width:100%}
.ck{display:flex;align-items:center;gap:7px;font-size:.84rem;cursor:pointer;padding:3px 0}
.ck input{accent-color:var(--t)}
.dl{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
@media(max-width:860px){.dl{grid-template-columns:1fr}}
.gallery{border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:var(--v)}
.gallery img{width:100%;height:100%;object-fit:cover;display:block}
.thumbs{display:flex;gap:7px;margin-top:7px}
.thumb{width:72px;height:54px;object-fit:cover;border-radius:7px;cursor:pointer;opacity:.65;transition:opacity .15s;border:2px solid transparent}
.thumb.act,.thumb:hover{opacity:1;border-color:var(--t)}
.cc{background:var(--v);border-radius:12px;padding:1.5rem;position:sticky;top:72px}
.cc h3{font-family:var(--fd);font-size:1.2rem;color:#fff;margin-bottom:1rem}
.ci{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:.6rem .9rem;color:#fff;font-family:var(--fb);font-size:.875rem;margin-bottom:.7rem;outline:none;transition:border-color .15s}
.ci::placeholder{color:rgba(255,255,255,.45)}.ci:focus{border-color:var(--tl)}
.dashl{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 64px)}
.dsi{background:var(--v);padding:1.5rem 0}
.dni{display:flex;align-items:center;gap:9px;padding:.7rem 1.4rem;color:rgba(255,255,255,.68);cursor:pointer;font-size:.875rem;font-weight:500;transition:all .15s}
.dni i{font-size:16px}
.dni:hover,.dni.act{background:rgba(255,255,255,.1);color:#fff}
.dni.act{border-left:2px solid var(--t)}
.dc{padding:1.75rem;background:var(--a)}
.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,47,.06);table-layout:fixed}
.tbl th{background:var(--v);color:#fff;padding:.7rem 1rem;text-align:left;font-size:.77rem;font-weight:500;letter-spacing:.04em}
.tbl td{padding:.85rem 1rem;border-bottom:1px solid var(--a);font-size:.85rem;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.stp{display:flex;align-items:center;margin-bottom:2rem;gap:0}
.stn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.stn.act{background:var(--t);color:#fff}.stn.don{background:var(--v);color:#fff}.stn.pen{background:#e0e0e0;color:var(--cz)}
.stl{font-size:.78rem;font-weight:500;margin-left:6px;white-space:nowrap}
.stl.act{color:var(--t)}.stl.pen{color:var(--cz)}
.stline{flex:1;height:2px;background:#e0e0e0;margin:0 6px}.stline.don{background:var(--v)}
.fg{margin-bottom:1.1rem}
.fl{display:block;font-size:.78rem;font-weight:500;margin-bottom:5px}
.fi{width:100%;padding:.6rem .9rem;border:1.5px solid #ddd;border-radius:8px;font-family:var(--fb);font-size:.88rem;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--t)}
.fs{width:100%;padding:.6rem .9rem;border:1.5px solid #ddd;border-radius:8px;font-family:var(--fb);font-size:.88rem;background:#fff;outline:none}
.tcg{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:1.5rem}
.tc{border:2px solid #eee;border-radius:12px;padding:1.25rem;text-align:center;cursor:pointer;transition:all .15s}
.tc:hover{border-color:var(--tl)}.tc.sel{border-color:var(--t);background:rgba(196,98,45,.05)}
.tc-ico{font-size:22px;color:var(--v);margin-bottom:.4rem}
.tc-ico i{font-size:22px}
.tc-l{font-weight:500;font-size:.88rem}.tc-s{font-size:.75rem;color:var(--cz);margin-top:3px}
.ok{background:#e8f5e9;color:#2e7d32;padding:.875rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.88rem;display:flex;align-items:center;gap:7px}
.ok i{font-size:16px}
.infocrd{background:#fff;border-radius:12px;padding:1.5rem;margin-top:1rem}
.divider{border:none;border-top:1px solid var(--a);margin:1.25rem 0}
.feat-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.875rem}
.feat-box{text-align:center;padding:.875rem;background:var(--a);border-radius:9px}
.feat-box i{font-size:18px;color:var(--v);display:block;margin-bottom:4px}
footer{background:var(--ch);color:rgba(255,255,255,.55);padding:1.75rem;text-align:center;font-size:.83rem}
footer strong{color:#fff}
/* ── RADAR ── */
.rdr-hero{background:var(--v);padding:3.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.rdr-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:300px;height:300px;border-radius:50%;background:rgba(196,98,45,.06);pointer-events:none}
.rdr-tag{display:inline-flex;align-items:center;gap:6px;background:var(--t);color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 13px;border-radius:99px;margin-bottom:18px}
.rdr-tag i{font-size:12px}
.rdr-h1{font-family:var(--fd);font-size:clamp(1.8rem,4vw,2.8rem);color:#fff;line-height:1.1;margin-bottom:.875rem}
.rdr-h1 em{color:var(--tl);font-style:normal}
.rdr-sub{color:rgba(255,255,255,.6);font-size:.9rem;max-width:480px;margin:0 auto 2.5rem;line-height:1.7;font-weight:300}
.rdr-demand{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem}
.rdr-dm{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.6rem 1rem;display:flex;align-items:center;gap:7px}
.rdr-dm-n{font-family:var(--fd);font-size:1.3rem;color:var(--tl);min-width:28px}
.rdr-dm-l{font-size:.72rem;color:rgba(255,255,255,.55);line-height:1.3}
.rdr-dm-l strong{color:rgba(255,255,255,.85);display:block}
.rdr-cta{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:680px;margin:0 auto}
.rdr-opt{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:14px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s}
.rdr-opt:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
.rdr-opt-ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px}
.rdr-opt-ico i{font-size:22px}
.rdr-opt-t{font-family:var(--fd);font-size:1rem;color:#fff;margin-bottom:4px}
.rdr-opt-s{font-size:.75rem;color:rgba(255,255,255,.5);line-height:1.45}
.rdr-ind-btn{display:inline-flex;align-items:center;gap:7px;margin-top:2rem;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.65);font-size:.8rem;font-weight:500;padding:.5rem 1.1rem;border-radius:8px;cursor:pointer;transition:all .15s;font-family:var(--fb)}
.rdr-ind-btn:hover{background:rgba(255,255,255,.08);color:#fff}
/* quero/posso forms */
.rdr-wrap{background:var(--a);padding:2rem;min-height:calc(100vh - 64px)}
.rdr-form{background:#fff;border-radius:14px;padding:2rem;max-width:620px;margin:0 auto}
.rdr-form-title{font-family:var(--fd);font-size:1.3rem;margin-bottom:.4rem}
.rdr-form-sub{color:var(--cz);font-size:.82rem;margin-bottom:1.5rem;line-height:1.55}
.rdr-seg{display:flex;background:var(--a);border-radius:9px;padding:3px;gap:3px;margin-bottom:1.25rem}
.rdr-seg-btn{flex:1;padding:.6rem;border-radius:7px;border:none;font-family:var(--fb);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--cz);background:transparent}
.rdr-seg-btn.on{background:#fff;color:var(--ch);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.rdr-types{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.rdr-type{border:1.5px solid #eee;border-radius:10px;padding:1rem;text-align:center;cursor:pointer;transition:all .15s}
.rdr-type:hover{border-color:var(--tl)}.rdr-type.sel{border-color:var(--t);background:rgba(196,98,45,.05)}
.rdr-type-ico{font-size:20px;color:var(--v);margin-bottom:5px}
.rdr-type-ico i{font-size:20px}
.rdr-type-l{font-size:.82rem;font-weight:500}.rdr-type-s{font-size:.7rem;color:var(--cz);margin-top:2px}
/* índice */
.ind-tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.ind-tab{padding:.5rem 1rem;border-radius:8px;border:1.5px solid #eee;background:transparent;font-family:var(--fb);font-size:.8rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--cz);display:inline-flex;align-items:center;gap:5px}
.ind-tab.on{background:var(--v);color:#fff;border-color:var(--v)}
.ind-tab i{font-size:14px}
.ind-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.ind-card{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid rgba(0,0,0,.07)}
.ind-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ind-area{font-size:.88rem;font-weight:600;color:var(--ch)}
.ind-trend{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:99px}
.ind-up{background:#e8f5e9;color:#2e7d32}.ind-eq{background:#f3f4f6;color:#666}
.ind-price{font-size:1.3rem;font-weight:700;color:var(--t);margin-bottom:2px}
.ind-label{font-size:.72rem;color:var(--cz);margin-bottom:10px}
.ind-bar-wrap{background:var(--a);border-radius:99px;height:5px;overflow:hidden;margin-bottom:5px}
.ind-bar-fill{height:100%;border-radius:99px}
.ind-bar-meta{display:flex;justify-content:space-between;font-size:.67rem;color:var(--cz)}
.ind-sem{display:inline-flex;align-items:center;gap:4px;font-size:.7rem;font-weight:600;margin-top:8px;padding:3px 8px;border-radius:99px}
.ind-abaixo{background:#e8f5e9;color:#2e7d32}.ind-medio{background:#fff3e0;color:#e65100}.ind-acima{background:#ffebee;color:#c62828}
/* sucesso */
.rdr-success{text-align:center;padding:2rem 1rem}
.rdr-success i{font-size:3rem;color:var(--v);display:block;margin-bottom:1rem}
.rdr-success-t{font-family:var(--fd);font-size:1.4rem;margin-bottom:.5rem}
.rdr-success-s{color:var(--cz);font-size:.85rem;line-height:1.65;max-width:340px;margin:0 auto 1.5rem}
.rdr-notif-box{background:var(--v);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.rdr-notif-box i{font-size:18px;color:var(--tl);flex-shrink:0}
.rdr-notif-txt{font-size:.8rem;color:rgba(255,255,255,.8);line-height:1.5}
.rdr-notif-txt strong{color:#fff}
@media(max-width:580px){.rdr-cta{grid-template-columns:1fr}.rdr-demand{gap:.6rem}}


/* === NEW FEATURES CSS === */
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:6px;background:rgba(255,255,255,.1);border-radius:8px;border:none;margin-left:auto}
.hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
.mob-drawer{display:none;position:fixed;inset:0;z-index:200}
.mob-drawer.open{display:block}
.mob-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.mob-panel{position:absolute;top:0;right:0;width:260px;height:100%;background:var(--v);padding:1.25rem;overflow-y:auto;transform:translateX(100%);transition:transform .28s}
.mob-drawer.open .mob-panel{transform:none}
.mob-item{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.85);font-size:.9rem;font-weight:500;padding:.75rem 1rem;border-radius:9px;cursor:pointer;transition:all .15s}
.mob-item:hover{background:rgba(255,255,255,.12);color:#fff}
.mob-sep{height:1px;background:rgba(255,255,255,.1);margin:.5rem 0}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid rgba(0,0,0,.08);padding:.5rem 0;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.bn-row{display:flex;justify-content:space-around}
.bn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:.35rem .75rem;background:none;border:none;font-family:var(--fb);position:relative}
.bn-btn span{font-size:.6rem;color:var(--cz);font-weight:500}
.bn-btn i{font-size:22px;color:var(--cz)}
.bn-btn.act i,.bn-btn.act span{color:var(--t)}
.bn-badge{position:absolute;top:4px;right:6px;min-width:16px;height:16px;border-radius:99px;background:var(--t);color:#fff;font-size:.55rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px}
@media(max-width:768px){.nav-links .nl:not(:last-child){display:none}.hamburger{display:flex}.bot-nav{display:block}body{padding-bottom:68px}}
.hrt{position:absolute;top:10px;right:10px;z-index:3;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hrt:hover{transform:scale(1.15)}
.hrt i{font-size:15px;color:#aaa;transition:color .2s}
.hrt.on i{color:#e53935}
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
.sk{background:linear-gradient(90deg,#e8e0d8 25%,#f5efe6 50%,#e8e0d8 75%);background-size:2000px 100%;animation:shimmer 1.8s infinite;border-radius:6px;display:block}
.sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.sort-sel{padding:.4rem .75rem;border-radius:8px;border:1.5px solid #EDE4D4;font-family:var(--fb);font-size:.82rem;background:#fff;color:var(--ch);cursor:pointer;outline:none}
.wa-fab{position:fixed;bottom:80px;right:18px;z-index:150;width:52px;height:52px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,211,102,.4);cursor:pointer;text-decoration:none;transition:all .2s}
.wa-fab:hover{transform:scale(1.08)}
.wa-fab i{font-size:26px}
@media(min-width:769px){.wa-fab{bottom:24px;right:84px}}

<body>
<div id="app"></div>
<script>

// === API BASE ===
const API_BASE = 'https://web-production-66119.up.railway.app/api';

// === TOAST ===
function showToast(msg, type) {
  let t = document.getElementById('kz-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'kz-toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:.75rem 1.4rem;border-radius:10px;font-family:DM Sans,sans-serif;font-size:.88rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(t);
  }
  t.style.background = type === 'err' ? '#c62828' : '#1A1A1A';
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._h);
  t._h = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(20px)'; }, 2800);
}

// === SCORE ===
const BENCHMARKS = { residential_m2: 3200, commercial_m2: 2800, lot_m2: 850, rural_ha: 19400 };
function calcScore(l) {
  let s = 5;
  if (l.price) {
    let r = null;
    if (l.type === 'rural' && l.area_ha) r = { val: l.price / l.area_ha, b: BENCHMARKS.rural_ha };
    else if (l.area && l.type === 'residential') r = { val: l.price / l.area, b: BENCHMARKS.residential_m2 };
    else if (l.area && l.type === 'commercial') r = { val: l.price / l.area, b: BENCHMARKS.commercial_m2 };
    else if (l.area && l.type === 'lot') r = { val: l.price / l.area, b: BENCHMARKS.lot_m2 };
    if (r) { const ratio = r.val / r.b; if (ratio < 0.80) s += 2.5; else if (ratio < 0.92) s += 1.5; else if (ratio < 1.05) s += 0.5; else if (ratio > 1.25) s -= 1.5; else if (ratio > 1.10) s -= 0.5; }
  }
  const np = (l.imgs || []).length || 1;
  if (np >= 7) s += 1.2; else if (np >= 4) s += 0.7; else if (np <= 1) s -= 1;
  const dl = (l.desc || '').length;
  if (dl > 300) s += 0.8; else if (dl > 100) s += 0.4; else s -= 0.5;
  const score = Math.min(10, Math.max(1, Math.round(s * 10) / 10));
  let label = null;
  if (score >= 8.0) label = { text: 'Oportunidade', cls: 'b-deal', icon: 'ti-bolt' };
  else if (score >= 6.5) label = { text: 'Preço Justo', cls: 'b-fair', icon: 'ti-check' };
  return { score, label };
}

// === API FETCH ===
async function apiFetch(path, method, body) {
  if (!method) method = 'GET';
  try {
    const headers = { 'Content-Type': 'application/json' };
    const token = S.token || localStorage.getItem('kaza_token');
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API_BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro na requisição');
    return data;
  } catch (e) { throw e; }
}

// === AUTH ===
async function doLogin() {
  const email = document.getElementById('login-email') && document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass') && document.getElementById('login-pass').value;
  if (!email || !pass) return showToast('Preencha e-mail e senha');
  try {
    const data = await apiFetch('/auth/login', 'POST', { email: email, password: pass });
    if (!data) return showToast('E-mail ou senha incorretos');
    S.token = data.token; S.user = data.user; S.auth = true;
    localStorage.setItem('kaza_token', S.token);
    localStorage.setItem('kaza_user', JSON.stringify(S.user));
    go('dashboard');
  } catch (err) { showToast('E-mail ou senha incorretos', 'err'); }
}

async function doRegister() {
  const name = document.getElementById('reg-name') && document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email') && document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone') && document.getElementById('reg-phone').value.trim();
  const pass = document.getElementById('reg-pass') && document.getElementById('reg-pass').value;
  const agency = document.getElementById('reg-agency') && document.getElementById('reg-agency').value;
  const creci = document.getElementById('reg-creci') && document.getElementById('reg-creci').value;
  if (!name || !email || !phone || !pass) return showToast('Preencha todos os campos obrigatórios');
  if (pass.length < 8) return showToast('Senha deve ter no mínimo 8 caracteres');
  try {
    const data = await apiFetch('/auth/register', 'POST', { name: name, email: email, phone: phone, password: pass, type: S.rt || 'person', agency_name: agency || undefined, creci: creci || undefined });
    if (!data) return showToast('Erro ao criar conta. Tente novamente.');
    S.token = data.token; S.user = data.user; S.auth = true;
    localStorage.setItem('kaza_token', S.token);
    localStorage.setItem('kaza_user', JSON.stringify(S.user));
    showToast('Conta criada com sucesso!');
    go('dashboard');
  } catch (err) { showToast(err.message || 'Erro ao criar conta', 'err'); }
}

async function doLogout() {
  S.token = null; S.user = null; S.auth = false; S.cache = {};
  localStorage.removeItem('kaza_token');
  localStorage.removeItem('kaza_user');
  go('home');
}

// === FAVORITES ===
function toggleFav(id) {
  if (!S.saved) S.saved = {};
  if (S.saved[id]) delete S.saved[id];
  else S.saved[id] = true;
  localStorage.setItem('kaza_favs', JSON.stringify(S.saved));
  render();
}

// === STORIES DATA ===
const STORIES = [
  { id: 's1', lid: '1', name: 'Fazenda 500ha', seen: false, img: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=200&q=70' },
  { id: 's2', lid: '2', name: 'Casa Piscina', seen: false, img: 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=200&q=70' },
  { id: 's3', lid: '4', name: 'Apto Centro', seen: true, img: 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=200&q=70' },
  { id: 's4', lid: '3', name: 'Fazenda 200ha', seen: false, img: 'https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=200&q=70' },
  { id: 's5', lid: '5', name: 'Sala Comercial', seen: true, img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=200&q=70' },
];

function openStory(sid) {
  const s = STORIES.find(x => x.id === sid);
  if (!s) return;
  s.seen = true;

  document.body.appendChild(bg);
}

    const data = await apiFetch('/me/listings');
    CS.listings = (data && data.listings || []).filter(function(l) { return l.status === 'active'; });
  } catch (e) { CS.listings = []; }

}

function csStep(n) { CS.step = n; renderCreateStory(); }
function csSelectListing(id) { CS.listingId = id; renderCreateStory(); }
function csClearVideo() { if (CS.localVideoUrl) URL.revokeObjectURL(CS.localVideoUrl); CS.videoFile = null; CS.localVideoUrl = null; renderCreateStory(); }
function csHandleFile(files) {
  if (!files || !files[0]) return;
  const f = files[0];
  if (!f.type.startsWith('video/')) return showToast('Selecione um arquivo de vídeo');
  if (f.size > 100 * 1024 * 1024) return showToast('Vídeo muito grande. Máx 100MB.');
  CS.videoFile = f;
  CS.localVideoUrl = URL.createObjectURL(f);
  renderCreateStory();
}
function csNext() {
  if (CS.step === 1 && !CS.videoFile) return showToast('Selecione um vídeo para continuar');
  if (CS.step === 2 && !CS.listingId && CS.listings.length > 0) return showToast('Selecione o imóvel que o vídeo mostra');
  csStep(CS.step + 1);
}
async function csPublish() {
  if (!CS.videoFile) return showToast('Nenhum vídeo selecionado');
  const listing = CS.listings.find(function(l) { return l.id === CS.listingId; });
  const btn = document.querySelector('.cs-btn-t');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i>Enviando...'; }
  try {
    const fd = new FormData();
    fd.append('video', CS.videoFile);
    if (CS.listingId) fd.append('listing_id', CS.listingId);
    const token = localStorage.getItem('kaza_token');
    const res = await fetch(API_BASE + '/stories', { method: 'POST', headers: token ? { 'Authorization': 'Bearer ' + token } : {}, body: fd });
    const data = res.ok ? await res.json() : null;
    const videoUrl = data && data.video_url || CS.localVideoUrl;
    const thumbUrl = data && data.thumb_url || (listing && listing.listing_photos && listing.listing_photos[0] && listing.listing_photos[0].url) || 'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=200&q=70';
    STORIES.unshift({ id: 's' + Date.now(), lid: CS.listingId || '', name: (listing && listing.title.substring(0, 16)) || 'Meu vídeo', seen: false, img: thumbUrl, nativeVideoUrl: videoUrl, localVideoUrl: CS.localVideoUrl, isOwn: true });
    document.getElementById('cs-modal-bg') && document.getElementById('cs-modal-bg').remove();
    showToast('Story publicado com sucesso!');
    render();
  } catch (e) {
    STORIES.unshift({ id: 's' + Date.now(), lid: CS.listingId || '', name: (listing && listing.title.substring(0, 16)) || 'Meu vídeo', seen: false, img: (listing && listing.listing_photos && listing.listing_photos[0] && listing.listing_photos[0].url) || 'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=200&q=70', localVideoUrl: CS.localVideoUrl, isOwn: true });
    document.getElementById('cs-modal-bg') && document.getElementById('cs-modal-bg').remove();
    showToast('Story adicionado!');
    render();
  }
}

async function loadAndRender() {
  try {
    const savedToken = localStorage.getItem('kaza_token');
    const savedUser = localStorage.getItem('kaza_user');
    if (savedToken && savedUser) { S.token = savedToken; S.user = JSON.parse(savedUser); S.auth = true; }
  } catch (e) {}
  try { const f = localStorage.getItem('kaza_favs'); if (f) S.saved = JSON.parse(f); } catch (e) {}
  const d = await apiFetch('/listings?limit=6&is_featured=true').catch(function() { return null; });
  if (d && d.listings && d.listings.length > 0) {
    const norm = function(l) {
      return { id: l.id, type: l.type, purpose: l.purpose, featured: l.is_featured, title: l.title, desc: l.description, city: l.city, neigh: l.neighborhood || l.city, price: l.price, area: l.area_m2, area_ha: l.area_ha, beds: l.bedrooms, baths: l.bathrooms, park: l.parking, views: l.views || 0, swap: l.accepts_swap || false, video_url: l.video_url || null, created_at: l.created_at, img: (l.listing_photos && l.listing_photos[0] && l.listing_photos[0].url) || 'https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=800&q=70', imgs: (l.listing_photos || []).map(function(p) { return p.url; }), adv: { name: (l.users && l.users.name) || 'Anunciante', agency: (l.users && l.users.agency_name) || 'KAZA Imóveis', ok: (l.users && l.users.is_verified) || false, phone: ((l.users && l.users.phone) || '').replace(/\D/g, '') } };
    };
    window._feat = d.listings.map(norm);
    window._all = d.listings.map(norm);
  }
  render();
}

function fmt(n,rent){
  if(rent)return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0})+'/mês';
  if(n>=1000000)return'R$ '+(n/1000000).toFixed(1).replace('.',',')+' mi';
  if(n>=1000)return'R$ '+(n/1000).toFixed(0)+'mil';
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
}
function btag(t){return`<span class="badge ${TC[t]}"><i class="ti ${TI[t]}" aria-hidden="true"></i>${TL[t]}</span>`}
function ptag(p){return p==='sale'?'<span class="badge b-vnd">Venda</span>':'<span class="badge b-alg">Aluguel</span>'}

function cardH(l){
  const price=fmt(l.price,l.purpose==='rent');
  const feats=l.beds
    ?`<span class="cf"><i class="ti ti-bed" aria-hidden="true"></i>${l.beds}</span><span class="cf"><i class="ti ti-bath" aria-hidden="true"></i>${l.baths}</span><span class="cf"><i class="ti ti-car" aria-hidden="true"></i>${l.park}</span>`
    :l.area_ha?`<span class="cf"><i class="ti ti-map" aria-hidden="true"></i>${l.area_ha}ha</span>`
    :`<span class="cf"><i class="ti ti-ruler-measure" aria-hidden="true"></i>${l.area}m²</span>`;
  return`<div class="card" onclick="go('detail',${l.id})">
    <div style="position:relative;overflow:hidden">
      <img class="card-img" src="${l.img}" loading="lazy" onerror="this.style.background='#c8d5cf'">
      <div style="position:absolute;top:10px;left:10px">${btag(l.type)}</div>
      ${l.featured?'<div style="position:absolute;top:10px;right:10px"><span class="badge b-feat"><i class="ti ti-star" aria-hidden="true"></i>Destaque</span></div>':''}
    </div>
    <div class="card-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <div class="card-price">${price}</div>${ptag(l.purpose)}
      </div>
      <div class="card-title">${l.title}</div>
      <div class="card-loc"><i class="ti ti-map-pin" aria-hidden="true"></i>${l.neigh} · ${l.city}</div>
      <div class="card-feats">${feats}<span style="flex:1"></span><span class="cf" style="color:var(--cz)"><i class="ti ti-eye" aria-hidden="true"></i>${l.views}</span></div>
    </div>
  </div>`;
}

function cardH(l){
  var price=fmt(l.price,l.purpose==='rent');
  var sc=calcScore(l);var lbl=sc&&sc.label;
  var isFav=!!(S.saved&&S.saved[l.id]);
  var feats=l.beds
    ?('<span class="cf"><i class="ti ti-bed"></i>'+l.beds+'</span>'
      +'<span class="cf"><i class="ti ti-bath"></i>'+l.baths+'</span>'
      +'<span class="cf"><i class="ti ti-car"></i>'+l.park+'</span>')
    :l.area_ha?('<span class="cf"><i class="ti ti-map"></i>'+l.area_ha+'ha</span>')
    :('<span class="cf"><i class="ti ti-ruler-measure"></i>'+(l.area||'')+'m²</span>');
  var topBadges='';
  if(l.featured)topBadges+='<span class="badge b-feat"><i class="ti ti-star"></i>Destaque</span>';
  if(lbl)topBadges+='<span class="badge '+lbl.cls+'"><i class="ti '+lbl.icon+'"></i>'+lbl.text+'</span>';
  var dstr='';
  if(l.created_at){
    var d=Math.floor((Date.now()-new Date(l.created_at))/864e5);
    dstr=d===0?'Publicado hoje':d===1?'Publicado ontem':d<7?'Publicado há '+d+' dias':d<30?'Publicado há '+Math.floor(d/7)+' sem.':'';
  }
  return'<div class="card" onclick="go(\'detail\',\''+l.id+'\')">'
    +'<div class="card-imgwrap" style="position:relative">'
    +'<img class="card-img" src="'+l.img+'" loading="lazy" alt="'+l.title+'" onerror="this.style.background=\'#c8d5cf\'">'
    +(l.video_url?'<div style="position:absolute;bottom:10px;left:10px;z-index:2"><span class="badge" style="background:rgba(0,0,0,.55);color:#fff"><i class="ti ti-player-play"></i>Vídeo</span></div>':'')
    +'<div style="position:absolute;top:12px;left:12px;z-index:2">'+btag(l.type)+'</div>'
    +(topBadges?'<div style="position:absolute;top:12px;right:46px;z-index:2;display:flex;flex-direction:column;gap:4px;align-items:flex-end">'+topBadges+'</div>':'')
    +'<button class="hrt'+(isFav?' on':'')+'" onclick="event.stopPropagation();toggleFav(\''+l.id+'\')" aria-label="'+(isFav?'Remover':'Salvar')+' favorito">'
    +'<i class="ti ti-heart'+(isFav?'-filled':'')+'"></i></button>'
    +'</div>'
    +'<div class="card-body">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">'
    +'<div class="card-price">'+price+'</div>'+ptag(l.purpose)+'</div>'
    +'<div class="card-title">'+l.title+'</div>'
    +'<div class="card-loc"><i class="ti ti-map-pin"></i>'+l.neigh+' · '+l.city+'</div>'
    +(dstr?'<div class="card-date"><i class="ti ti-clock"></i>'+dstr+'</div>':'')
    +'<div class="card-feats">'+feats
    +(l.swap?'<span class="badge b-swap" style="font-size:.62rem;padding:2px 6px"><i class="ti ti-arrows-exchange"></i>Permuta</span>':'')
    +'<span style="flex:1"></span>'
    +'<span class="cf" style="color:var(--cz)"><i class="ti ti-eye"></i>'+l.views+'</span>'
    +'</div></div></div>';
}

// ── Simple autocomplete for search ───────────────────
var _acSugs = ['Barreiras', 'Luís Eduardo Magalhães', 'São Desidério', 'Jaborandi',
               'Formosa do Rio Preto', 'Residencial', 'Rural', 'Comercial', 'Lote'];
function acSearch(el) {
  var q = el.value.trim().toLowerCase();
  var drop = document.getElementById('ac-drop');
  if (!drop) {
    drop = document.createElement('div');
    drop.id = 'ac-drop';
    drop.className = 'ac-drop';
    el.parentNode.style.position = 'relative';
    el.parentNode.appendChild(drop);
  }
  if (q.length < 2) { drop.innerHTML = ''; drop.style.display = 'none'; return; }
  var matches = _acSugs.filter(function(s){ return s.toLowerCase().indexOf(q) > -1; }).slice(0,5);
  if (matches.length === 0) { drop.style.display = 'none'; return; }
  var hl = function(s){ var i=s.toLowerCase().indexOf(q); return i<0?s:s.slice(0,i)+'<span class="ac-hl">'+s.slice(i,i+q.length)+'</span>'+s.slice(i+q.length); };
  drop.innerHTML = matches.map(function(m){ return '<div class="ac-item" onclick="acSelect(this,&quot;'+m+'&quot;)"><i class="ti ti-map-pin"></i>'+hl(m)+'</div>'; }).join('');
  drop.style.display = 'block';
}
function acSelect(el, val) { if (typeof val === "string") val = val.replace(/&quot;/g,""); 
  var input = el.closest('.ac-wrap') && el.closest('.ac-wrap').querySelector('input') || document.querySelector('.sbar input');
  if (input) { input.value = val; input.dispatchEvent(new Event('input')); }
  el.parentNode.style.display = 'none';
  setF('search', val);
  go('listings');
}
document.addEventListener('click', function(e){ var d=document.getElementById('ac-drop'); if(d&&!d.contains(e.target))d.style.display='none'; });

<script>
// ═══ KAZA IA ═══════════════════════════════════════
var IA={
  open:false, loading:false, msgs:[],
  system:'Você é a KAZA IA, assistente de busca de imóveis do portal KAZA Imóveis. Entenda o que o cliente busca em linguagem natural e use search_listings. Se não encontrar, use create_radar_alert. Seja amigável e conciso. Português brasileiro informal.',
  tools:[
    {name:'search_listings',description:'Busca imóveis com os critérios do cliente',input_schema:{type:'object',properties:{type:{type:'string',enum:['residential','rural','lot','commercial']},purpose:{type:'string',enum:['sale','rent']},city:{type:'string'},min_beds:{type:'number'},max_price:{type:'number'},min_area_ha:{type:'number'},search:{type:'string'}}}},
    {name:'create_radar_alert',description:'Registra alerta no Radar. Cliente será notificado quando aparecer imóvel compatível.',input_schema:{type:'object',properties:{type:{type:'string'},purpose:{type:'string'},city:{type:'string'},description:{type:'string'},max_price:{type:'number'}},required:['type','purpose']}}
  ]
};

function iaOpenListing(el){var lid=el.dataset&&el.dataset.lid;if(lid){go('detail',lid);toggleIA();}}
function toggleIA(){
  IA.open=!IA.open;
  var panel=document.getElementById('kz-ia-panel');
  if(IA.open){panel.classList.add('open');document.getElementById('kz-ia-inp').focus();}
  else panel.classList.remove('open');
}

function iaSearch(p){
  var r=L.slice();
  if(p.type)r=r.filter(function(l){return l.type===p.type;});
  if(p.purpose)r=r.filter(function(l){return l.purpose===p.purpose;});
  if(p.city)r=r.filter(function(l){return (l.city||'').toLowerCase().indexOf(p.city.toLowerCase())>-1;});
  if(p.min_beds)r=r.filter(function(l){return (l.beds||0)>=p.min_beds;});
  if(p.max_price)r=r.filter(function(l){return (l.price||0)<=p.max_price;});
  if(p.min_area_ha)r=r.filter(function(l){return (l.area_ha||0)>=p.min_area_ha;});
  if(p.search)r=r.filter(function(l){return (l.title||'').toLowerCase().indexOf(p.search.toLowerCase())>-1;});
  return{total:r.length,results:r.slice(0,3).map(function(l){return{id:l.id,title:l.title,price:l.price,type:l.type,purpose:l.purpose,beds:l.beds,area:l.area,area_ha:l.area_ha,city:l.city,neigh:l.neigh,img:l.img};})};
}

async function iaCallAPI(messages){
  var res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:IA.system,tools:IA.tools,messages:messages})
  });
  return res.json();
}

async function iaProcess(data,msgs,sr){
  if(data.stop_reason!=='tool_use'){
    var txt=data.content.filter(function(c){return c.type==='text';}).map(function(c){return c.text;}).join('');
    return{txt:txt,sr:sr,msgs:msgs};
  }
  var trs=[];var uSr=Object.assign({},sr);
  for(var i=0;i<data.content.length;i++){
    var b=data.content[i];
    if(b.type!=='tool_use')continue;
    var res;
    if(b.name==='search_listings'){res=iaSearch(b.input);uSr=res;}
    else if(b.name==='create_radar_alert'){res={success:true,id:'R-'+Math.random().toString(36).substr(2,6).toUpperCase(),params:b.input};uSr=Object.assign({},uSr,{radar:res,rp:b.input});}
    trs.push({type:'tool_result',tool_use_id:b.id,content:JSON.stringify(res)});
  }
  var nm=msgs.concat([{role:'assistant',content:data.content},{role:'user',content:trs}]);
  return iaProcess(await iaCallAPI(nm),nm,uSr);
}

async function iaSend(text){
  var inp=document.getElementById('kz-ia-inp');
  var msg=(text||inp&&inp.value||'').trim();
  if(!msg||IA.loading)return;
  if(inp){inp.value='';inp.style.height='auto';}
  document.getElementById('kz-ia-send').disabled=true;
  var welcome=document.getElementById('kz-ia-welcome');
  if(welcome)welcome.style.display='none';
  iaAddMsg('usr',msg);
  IA.msgs.push({role:'user',content:msg});
  IA.loading=true;
  var tid='ia-t'+Date.now();
  iaAddTyping(tid);
  try{
    var data=await iaCallAPI(IA.msgs);
    var res=await iaProcess(data,IA.msgs,{});
    IA.msgs=[].concat(res.msgs).concat([{role:'assistant',content:res.txt}]);
    document.getElementById(tid)&&document.getElementById(tid).remove();
    iaAddMsg('bot',res.txt,res.sr&&res.sr.results,res.sr&&res.sr.total,res.sr&&res.sr.radar);
  }catch(e){
    document.getElementById(tid)&&document.getElementById(tid).remove();
    iaAddMsg('bot','Tive um problema ao buscar. Tente novamente!');
  }finally{IA.loading=false;}
}

function iaAddMsg(from,text,listings,total,radar){
  var msgs=document.getElementById('kz-ia-msgs');
  var fmtP=function(n,rent){if(!n)return'—';if(rent)return'R$ '+n.toLocaleString('pt-BR')+'/mês';if(n>=1e6)return'R$ '+(n/1e6).toFixed(1).replace('.',',')+' mi';return'R$ '+(n/1e3).toFixed(0)+'mil';};
  var div=document.createElement('div');
  div.className='ia-row '+from;
  var html='';
  if(from==='bot')html+='<div class="ia-byline"><div class="ia-byav">K</div><span style="font-size:.68rem;font-weight:500;color:#1E3A2F">KAZA IA</span></div>';
  html+='<div class="ia-bubble '+from+'">'+text.split('\n').join('<br>')+'</div>';
  if(listings&&listings.length>0){
    html+='<div style="margin-top:8px"><div style="font-size:.68rem;color:#8A7F77;margin-bottom:5px">'+(total>3?'Mostrando 3 de '+total+' encontrados:':total+' imóvel(is):')+' </div>';
    html+='<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none">';
    for(var i=0;i<listings.length;i++){var l=listings[i];
      html+='<div style="background:#fff;border-radius:9px;overflow:hidden;border:1px solid rgba(0,0,0,.08);width:160px;flex-shrink:0;cursor:pointer" data-lid="'+l.id+'" onclick="iaOpenListing(this)">'
        +'<img src="'+(l.img||'')+'" style="width:100%;height:90px;object-fit:cover;display:block;background:#c8d5cf" loading="lazy" alt="'+l.title+'">'
        +'<div style="padding:6px 8px"><div style="font-size:.75rem;font-weight:700;color:#C4622D">'+fmtP(l.price,l.purpose==='rent')+'</div>'
        +'<div style="font-size:.67rem;font-weight:500;color:#111;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+l.title+'</div>'
        +'<div style="font-size:.62rem;color:#8A7F77;margin-top:2px">'+(''+l.neigh+' · '+l.city).substring(0,30)+'</div></div></div>';
    }
    html+='</div></div>';
  }
  if(radar){
    var rid='rad'+Date.now();
    html+='<div style="margin-top:8px;background:#F5EFE6;border:1px solid rgba(196,98,45,.25);border-radius:10px;padding:10px 11px">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:14px">📡</span><span style="font-size:.78rem;font-weight:600;color:#1E3A2F">Radar ativado</span></div>'
      +'<div style="font-size:.72rem;color:#5a4e46;line-height:1.55;margin-bottom:8px">Deixe seu contato para ser avisado no WhatsApp quando aparecer um imóvel compatível.</div>'
      +'<div style="display:flex;gap:6px;margin-bottom:6px">'
      +'<input id="'+rid+'-n" placeholder="Seu nome" style="flex:1;padding:6px 8px;border:1.5px solid rgba(196,98,45,.3);border-radius:6px;font-size:.72rem;font-family:inherit;outline:none">'
      +'<input id="'+rid+'-p" placeholder="WhatsApp" style="flex:1;padding:6px 8px;border:1.5px solid rgba(196,98,45,.3);border-radius:6px;font-size:.72rem;font-family:inherit;outline:none">'
      +'</div>'
      +'<button data-rid="'+rid+'" onclick="iaRadarConfirm(this.dataset.rid,this.closest(\'div\'))" style="width:100%;background:#C4622D;color:#fff;border:none;border-radius:7px;padding:7px;font-size:.75rem;font-weight:500;cursor:pointer;font-family:inherit">📡 Ativar meu alerta</button>'
      +'</div>';
  }
  div.innerHTML=html;
  msgs.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

function iaRadarConfirm(id,box){
  var name=document.getElementById(id+'-n')&&document.getElementById(id+'-n').value.trim();
  var phone=document.getElementById(id+'-p')&&document.getElementById(id+'-p').value.trim();
  if(!name||!phone){showToast('Preencha nome e WhatsApp para ativar o alerta.');return;}
  if(box)box.innerHTML='<div style="text-align:center;padding:10px"><div style="font-size:20px;margin-bottom:6px">🎯</div><div style="font-size:.8rem;font-weight:600;color:#1E3A2F;margin-bottom:3px">Radar ativo, '+name+'!</div><div style="font-size:.72rem;color:#5a4e46">Vamos te avisar no WhatsApp '+phone+'.</div></div>';
}

function iaAddTyping(id){
  var msgs=document.getElementById('kz-ia-msgs');
  var div=document.createElement('div');
  div.id=id;div.className='ia-typing';
  div.innerHTML='<div class="ia-byav" style="width:22px;height:22px;font-size:10px">K</div><div class="ia-typing-bub"><div class="ia-dot-anim" style="animation-delay:0s"></div><div class="ia-dot-anim" style="animation-delay:.15s"></div><div class="ia-dot-anim" style="animation-delay:.3s"></div></div>';
  msgs.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

// === SHARE FEATURE ===
function openShare(lid) {
  var l = L.find(function(x) { return String(x.id) === String(lid); }) || L[0];
  // Build shareable URL (hash-based for single-page app)
  var base = window.location.origin + window.location.pathname;
  var url = base + '?imovel=' + l.id;
  var priceStr = fmt(l.price, l.purpose === 'rent');
  var waMsg = encodeURIComponent(
    '🏡 *' + l.title + '*\n'
    + '💰 ' + priceStr + '\n'
    + '📍 ' + l.neigh + ', ' + l.city + ' — BA\n\n'
    + 'Ver no KAZA Imóveis: ' + url
  );
  var tgText = encodeURIComponent('🏡 ' + l.title + ' — ' + priceStr + ' · ' + l.neigh + ', ' + l.city + ' BA');
  var encUrl = encodeURIComponent(url);
  var emailSub = encodeURIComponent('Imóvel para você: ' + l.title);
  var emailBody = encodeURIComponent(
    'Olá!\n\nEncontrei este imóvel no KAZA Imóveis:\n\n'
    + l.title + '\n'
    + priceStr + '\n'
    + l.neigh + ', ' + l.city + ' — BA\n\n'
    + 'Veja mais em: ' + url
  );

  // Remove stale overlay if any
  var prev = document.querySelector('.share-overlay');
  if (prev) prev.remove();

  var overlay = document.createElement('div');
  overlay.className = 'share-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = '<div class="share-sheet" onclick="event.stopPropagation()">'
    + '<div class="share-handle"></div>'
    + '<div class="share-sheet-title">Compartilhar imóvel</div>'
    + '<div class="share-sheet-sub">' + l.title + ' &middot; ' + l.neigh + ', ' + l.city + '</div>'
    + '<div class="share-grid">'

    // WhatsApp
    + '<button class="share-item" onclick="window.open(\'https://wa.me/?text=' + waMsg + '\',\'_blank\');document.querySelector(\'.share-overlay\').remove()">'
    + '<div class="share-ico" style="background:#dcfce7"><i class="ti ti-brand-whatsapp" style="color:#16a34a"></i></div>'
    + '<span class="share-item-lbl">WhatsApp</span></button>'

    // Telegram
    + '<button class="share-item" onclick="window.open(\'https://t.me/share/url?url=' + encUrl + '&text=' + tgText + '\',\'_blank\');document.querySelector(\'.share-overlay\').remove()">'
    + '<div class="share-ico" style="background:#dbeafe"><i class="ti ti-brand-telegram" style="color:#2563eb"></i></div>'
    + '<span class="share-item-lbl">Telegram</span></button>'

    // E-mail
    + '<button class="share-item" onclick="window.location.href=\'mailto:?subject=' + emailSub + '&body=' + emailBody + '\';document.querySelector(\'.share-overlay\').remove()">'
    + '<div class="share-ico" style="background:#fef3c7"><i class="ti ti-mail" style="color:#d97706"></i></div>'
    + '<span class="share-item-lbl">E-mail</span></button>'

    // Instagram (copy + instrução)
    + '<button class="share-item" onclick="shareInstagram(\'' + encodeURIComponent(url) + '\')">'
    + '<div class="share-ico" style="background:linear-gradient(135deg,#fce7f3 0%,#ede9fe 100%)"><i class="ti ti-brand-instagram" style="color:#db2777"></i></div>'
    + '<span class="share-item-lbl">Instagram</span></button>'

    + '</div>'

    // Copy link row
    + '<div class="share-copy-row">'
    + '<div class="share-copy-txt">' + url + '</div>'
    + '<button class="share-copy-action" id="kz-share-copy-btn" onclick="doShareCopy(\'' + encodeURIComponent(url) + '\',\'kz-share-copy-btn\')">'
    + '<i class="ti ti-copy"></i>Copiar link</button>'
    + '</div>'

    // Dismiss
    + '<button class="share-dismiss" onclick="document.querySelector(\'.share-overlay\').remove()">Fechar</button>'
    + '</div>';

  document.body.appendChild(overlay);
}

function shareInstagram(encUrl) {
  doShareCopy(encUrl, null);
  var prev = document.querySelector('.share-overlay');
  if (prev) prev.remove();
  showToast('📸 Link copiado! Cole no bio ou story do Instagram.');
}

function doShareCopy(encUrl, btnId) {
  var url = decodeURIComponent(encUrl);
  var btn = btnId ? document.getElementById(btnId) : null;
  var onDone = function() {
    if (btn) {
      var orig = btn.innerHTML;
      btn.innerHTML = '<i class="ti ti-check"></i>Copiado!';
      btn.style.background = '#16a34a';
      setTimeout(function() {
        if (btn) { btn.innerHTML = orig; btn.style.background = ''; }
      }, 2400);
    } else {
      showToast('Link copiado!');
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(onDone).catch(function() {
      _fallbackCopy(url); onDone();
    });
  } else {
    _fallbackCopy(url); onDone();
  }
}

function _fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}
</script>
